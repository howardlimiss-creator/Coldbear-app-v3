function FanPressure({ outlets, nr, setNr, mat, setMat, method, setMethod, paRate, setPaRate, vMain, setVMain, vBranch, setVBranch, rectH, runLen }) {
  const [boot] = useState(() => loadFan());
  const [supply, setSupply] = useState(boot.supply || []);
  const [ret, setRet] = useState(boot.ret || []);
  const [ahu, setAhu] = useState(() => boot.ahu || [
    { id: rid(), label: "Filter", pa: "50" },
    { id: rid(), label: "Cooling coil", pa: "120" },
    { id: rid(), label: "AHU / casing", pa: "50" },
  ]);
  const [term, setTerm] = useState(boot.term || "25");

  useEffect(() => { persistFan({ supply, ret, ahu, term }); }, [supply, ret, ahu, term]);

  const f1 = (x) => (x || x === 0 ? Number(x).toFixed(1) : "—");
  const ks = KS[mat], target = parseFloat(paRate) || 1, lim = NR_LIMITS[nr];
  const tvMain = parseFloat(vMain) || lim.main;

  const sizeSeg = (row) => {
    const Q = Math.max(0, parseFloat(row.Q) || 0);
    if (Q <= 0) return null;
    const fixed = parseFloat(row.dia) || 0;
    const dia = fixed > 0 ? fixed : nextStd(method === "ef" ? diaForFriction(Q, target, ks) : diaForVel(Q, tvMain));
    const v = velRound(Q, dia);
    const pv = velPressure(v);
    const fr = frictionPaPerM(Q, dia, ks);
    const L = parseFloat(row.L) || 0;
    const straight = fr * L;
    const ksum = (row.fit || []).reduce((s, f) => s + (parseFloat(f.k) || 0) * (parseInt(f.q) || 0), 0);
    const fitLoss = ksum * pv;
    return { dia, fixed: fixed > 0, v, pv, fr, L, straight, ksum, fitLoss, dp: straight + fitLoss };
  };

  const calc = useMemo(() => {
    const S = supply.map((r) => ({ r, s: sizeSeg(r) }));
    const R = ret.map((r) => ({ r, s: sizeSeg(r) }));
    const supDP = S.reduce((a, x) => a + (x.s ? x.s.dp : 0), 0);
    const retDP = R.reduce((a, x) => a + (x.s ? x.s.dp : 0), 0);
    const ahuDP = ahu.reduce((a, x) => a + (parseFloat(x.pa) || 0), 0);
    const termDP = parseFloat(term) || 0;
    const vSup = S.reduce((m, x) => Math.max(m, x.s ? x.s.v : 0), 0);
    const vRet = R.reduce((m, x) => Math.max(m, x.s ? x.s.v : 0), 0);
    const lenSup = S.reduce((a, x) => a + (x.s ? x.s.L : 0), 0);
    return { S, R, supDP, retDP, ahuDP, termDP, fanDP: supDP + retDP + ahuDP + termDP, vSup, vRet, lenSup };
  }, [supply, ret, ahu, term, nr, mat, method, paRate, vMain]);

  const addRow = (set) => () => set((rows) => [...rows, { id: rid(), name: "", Q: "", L: "", dia: "", fit: [] }]);
  const updRow = (set) => (id, k, v) => set((rows) => rows.map((r) => (r.id === id ? { ...r, [k]: v } : r)));
  const delRow = (set) => (id) => set((rows) => rows.filter((r) => r.id !== id));
  const addFit = (set) => (id, t) => {
    const f = FITTINGS.find((x) => x.t === t); if (!f) return;
    set((rows) => rows.map((r) => (r.id === id ? { ...r, fit: [...(r.fit || []), { id: rid(), t: f.t, k: String(f.k), q: "1" }] } : r)));
  };
  const updFit = (set) => (id, fid, k, v) => set((rows) => rows.map((r) => (r.id === id ? { ...r, fit: r.fit.map((f) => (f.id === fid ? { ...f, [k]: v } : f)) } : r)));
  const delFit = (set) => (id, fid) => set((rows) => rows.map((r) => (r.id === id ? { ...r, fit: r.fit.filter((f) => f.id !== fid) } : r)));

  const seedFromDuct = () => {
    const d = computeDuct(outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch);
    if (!d || d.total <= 0) return;
    const segs = d.segs.filter((s) => s.s);
    const n = segs.length || 1;
    const Lper = (parseFloat(runLen) || 0) ? Math.round((parseFloat(runLen) / n) * 10) / 10 : "";
    const rows = segs.map((s) => ({ id: rid(), name: s.label, Q: String(Math.round(s.Q)), L: Lper ? String(Lper) : "", dia: "", fit: [] }));
    const lastB = d.branches.filter((b) => b.s).slice(-1)[0];
    if (lastB) rows.push({ id: rid(), name: (lastB.label || "branch") + " (branch)", Q: String(Math.round(lastB.Q)), L: "", dia: "", fit: [] });
    setSupply(rows);
  };

  const planHas = () => { const p = loadPlan(); return (p.indexPath && p.indexPath.length) || (p.returnPath && p.returnPath.length); };
  const pullFromPlan = () => {
    const p = loadPlan();
    const toRows = (arr) => (arr || []).map((s) => ({ id: rid(), name: s.name || "", Q: s.Q ? String(s.Q) : "", L: (s.L || s.L === 0) ? String(s.L) : "", dia: s.dia ? String(s.dia) : "", fit: [] }));
    if (p.indexPath && p.indexPath.length) setSupply(toRows(p.indexPath));
    if (p.returnPath && p.returnPath.length) setRet(toRows(p.returnPath));
  };

  // render helper (a plain function, NOT a child component — keeps input focus across keystrokes)
  const renderSegs = (rows, set, side) => (
    <div className="hl-fanlist">
      {rows.length === 0 && <div className="hl-note" style={{ padding: "2px 2px 8px" }}>No {side} segments yet.</div>}
      {rows.map((r, i) => {
        const s = sizeSeg(r);
        const vlim = side === "return" ? lim.ret : lim.main;
        return (
          <div className="hl-fanseg" key={r.id}>
            <div className="hl-fanhead">
              <span className="hl-winnum">{i + 1}</span>
              <input className="hl-jobinput" style={{ padding: "8px 10px", fontSize: "13px", flex: "1 1 auto" }} value={r.name} onChange={(e) => updRow(set)(r.id, "name", e.target.value)} placeholder={(side === "return" ? "Return seg " : "Segment ") + (i + 1)} />
              <button className="hl-del win" onClick={() => delRow(set)(r.id)} aria-label="Remove">×</button>
            </div>
            <div className="hl-fanfields">
              <div className="hl-winfield area"><label className="hl-flbl">Flow</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={r.Q} onChange={(e) => updRow(set)(r.id, "Q", e.target.value)} placeholder="0" /><span className="hl-suffix">L/s</span></div></div>
              <div className="hl-winfield area"><label className="hl-flbl">Length</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={r.L} onChange={(e) => updRow(set)(r.id, "L", e.target.value)} placeholder="0" /><span className="hl-suffix">m</span></div></div>
              <div className="hl-winfield area"><label className="hl-flbl">Ø fix</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={r.dia} onChange={(e) => updRow(set)(r.id, "dia", e.target.value)} placeholder="auto" /><span className="hl-suffix">mm</span></div></div>
            </div>
            {s && (
              <div className="hl-fanrowout">
                <span className={"mono" + (s.v > vlim ? " red" : "")}>{s.dia}Ø{s.fixed ? " (fixed)" : ""} · {f1(s.v)} m/s</span>
                <span className="mono faintc">{f1(s.fr)} Pa/m · Pv {Math.round(s.pv)}</span>
                <span className="mono cold">ΔP {f1(s.dp)} Pa</span>
              </div>
            )}
            <div className="hl-fanfit">
              {(r.fit || []).map((f) => (
                <div className="hl-fitrow" key={f.id}>
                  <span className="hl-fitname">{f.t}</span>
                  <div className="hl-unitfield xs"><span className="hl-suffix" style={{ padding: "0 2px 0 0" }}>k</span><input className="hl-num xs" type="number" inputMode="decimal" value={f.k} onChange={(e) => updFit(set)(r.id, f.id, "k", e.target.value)} /></div>
                  <div className="hl-unitfield xs"><span className="hl-suffix" style={{ padding: "0 2px 0 0" }}>×</span><input className="hl-num xs" type="number" inputMode="numeric" value={f.q} onChange={(e) => updFit(set)(r.id, f.id, "q", e.target.value)} /></div>
                  <button className="hl-del win" onClick={() => delFit(set)(r.id, f.id)} aria-label="Remove fitting">×</button>
                </div>
              ))}
              <select className="hl-sel" value="" onChange={(e) => { if (e.target.value) addFit(set)(r.id, e.target.value); e.target.value = ""; }}>
                <option value="">+ Add fitting…</option>
                {FITTINGS.map((f) => <option key={f.t} value={f.t}>{f.t} (k {f.k})</option>)}
              </select>
            </div>
          </div>
        );
      })}
    </div>
  );

  return (
    <div className="hl-grid">
      <div className="hl-inputs">
        <section className="hl-card">
          <div className="hl-cardhead"><h2>Design basis</h2><span className="hl-hint">shared with Duct tab</span></div>
          <div className="hl-field"><label className="hl-lbl">Noise rating (area)</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={nr} onChange={(e) => setNr(e.target.value)}>
              <option value="30">NR30 · bedrooms, quiet studies</option><option value="35">NR35 · living areas, private offices</option><option value="40">NR40 · open offices, retail</option><option value="45">NR45 · shops, busy areas</option><option value="50">NR50 · workshops, noisy areas</option></select></div></div>
          <div className="hl-field"><label className="hl-lbl">Duct material</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={mat} onChange={(e) => setMat(e.target.value)}>
              <option value="galv">Galvanised steel (0.15 mm)</option><option value="alum">Aluminium (0.05 mm)</option><option value="flex">Flexible (~0.9 mm)</option></select></div></div>
          <div className="hl-field"><label className="hl-lbl">Sizing method</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={method} onChange={(e) => setMethod(e.target.value)}>
              <option value="ef">Equal friction (Pa/m)</option><option value="vel">Velocity (m/s)</option></select></div></div>
          {method === "ef" && <Field label="Friction rate" suffix="Pa/m" value={paRate} onChange={setPaRate} note="≈1 typical" />}
          {method === "vel" && <Field label="Main velocity" suffix="m/s" value={vMain} onChange={setVMain} note={"NR limit " + lim.main} />}
          <div className="hl-note">Each segment sizes from this basis (or type a fixed Ø). Per segment ΔP = friction × length + Σ(k × Pv), Pv = 0.6 V². Build the run from the fan to the worst (index) terminal.</div>
        </section>

        <section className="hl-card">
          <div className="hl-cardhead"><h2>Supply run — fan → index terminal</h2><span className="hl-hint">in order</span></div>
          {renderSegs(supply, setSupply, "supply")}
          <div className="hl-ductbtns">
            <button className="hl-add" onClick={addRow(setSupply)}>+ Add segment</button>
            <button className="hl-add" onClick={pullFromPlan} disabled={!planHas()} title="Use the index run drawn on the Plan tab (as-drawn sizes + lengths)">Pull from Plan</button>
            <button className="hl-add" onClick={seedFromDuct} title="Build supply segments from the Duct tab trunk + farthest branch">Seed from Duct tab</button>
          </div>
        </section>

        <section className="hl-card">
          <div className="hl-cardhead"><h2>Return run</h2><span className="hl-hint">optional</span></div>
          {renderSegs(ret, setRet, "return")}
          <div className="hl-ductbtns"><button className="hl-add" onClick={addRow(setRet)}>+ Add segment</button></div>
        </section>

        <section className="hl-card">
          <div className="hl-cardhead"><h2>Plant-side losses</h2><span className="hl-hint">coil · filter · AHU</span></div>
          <div className="hl-fanlist">
            {ahu.map((a) => (
              <div className="hl-fitrow" key={a.id}>
                <input className="hl-jobinput" style={{ padding: "8px 10px", fontSize: "13px", flex: "1 1 auto" }} value={a.label} onChange={(e) => setAhu((xs) => xs.map((x) => (x.id === a.id ? { ...x, label: e.target.value } : x)))} placeholder="Component" />
                <div className="hl-unitfield sm"><input className="hl-num sm" type="number" min="0" inputMode="decimal" value={a.pa} onChange={(e) => setAhu((xs) => xs.map((x) => (x.id === a.id ? { ...x, pa: e.target.value } : x)))} placeholder="0" /><span className="hl-suffix">Pa</span></div>
                <button className="hl-del win" onClick={() => setAhu((xs) => xs.filter((x) => x.id !== a.id))} aria-label="Remove">×</button>
              </div>
            ))}
          </div>
          <div className="hl-ductbtns"><button className="hl-add" onClick={() => setAhu((xs) => [...xs, { id: rid(), label: "", pa: "" }])}>+ Add component</button></div>
          <Field label="Terminal / diffuser" suffix="Pa" value={term} onChange={setTerm} note="DA3 ≈25" />
        </section>
      </div>

      <div className="hl-results">
        <div className="hl-resultcard">
          <div className="hl-eyebrow">Required fan total pressure</div>
          <div className="hl-big" style={{ fontSize: "46px" }}>{Math.round(calc.fanDP)}<span className="hl-bigunit">Pa</span></div>
          <div className="hl-reqline">supply + return ducts &amp; fittings + plant + terminal</div>
          <div className="hl-metarow"><span>Supply ducts &amp; fittings</span><span className="mono">{f1(calc.supDP)} Pa</span></div>
          <div className="hl-metarow"><span>Return ducts &amp; fittings</span><span className="mono">{f1(calc.retDP)} Pa</span></div>
          <div className="hl-metarow"><span>Plant (coil/filter/AHU)</span><span className="mono">{f1(calc.ahuDP)} Pa</span></div>
          <div className="hl-metarow"><span>Terminal</span><span className="mono">{f1(calc.termDP)} Pa</span></div>
          <div className="hl-metarow faint"><span>Index supply length</span><span className="mono">{f1(calc.lenSup)} m</span></div>
          <div className="hl-metarow faint"><span>Max velocity — supply</span><span className={"mono" + (calc.vSup > lim.main ? " red" : "")}>{f1(calc.vSup)} m/s</span></div>
          <div className="hl-metarow faint"><span>Max velocity — return</span><span className={"mono" + (calc.vRet > lim.ret ? " red" : "")}>{f1(calc.vRet)} m/s</span></div>
          <p className="hl-foot">Dolphin-style index-run pressure: each segment ΔP = friction × length + Σ(k × Pv). Add the AHU, coil, filter and any attenuator on the plant side; the fan total pressure is the whole loop the fan must overcome. Fitting k-values are typical starting figures — confirm against DA3 Section 6 for tender work. Saved automatically on this device.</p>
        </div>
      </div>
    </div>
  );
}

function DrawingRef() {
  const [img, setImg] = useState(() => (PLAN_IMG ? PLAN_IMG.url : null));
  const [iw, setIw] = useState((PLAN_IMG && PLAN_IMG.iw) || 1000);
  const [ih, setIh] = useState((PLAN_IMG && PLAN_IMG.ih) || 680);
  const [doc, setDoc] = useState(null);
  const [pages, setPages] = useState(0);
  const [page, setPage] = useState(1);
  const [renderScl, setRenderScl] = useState(0);
  const [zoom, setZoom] = useState(1);
  const [scale, setScale] = useState(() => loadPlan().scale || 0);
  const [scaleLen, setScaleLen] = useState("4");
  const [plotScale, setPlotScale] = useState("100");
  const [mode, setMode] = useState("measure");
  const [pts, setPts] = useState([]);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  useEffect(() => { const cur = loadPlan(); cur.scale = scale; persistPlan(cur); }, [scale]);

  const f1 = (x) => (x || x === 0 ? Number(x).toFixed(1) : "—");

  const renderPage = async (d, n) => {
    setBusy(true); setErr("");
    try { const r = await pdfPageToImg(d, n, 1.5); PLAN_IMG = { url: r.url, iw: r.w, ih: r.h }; setImg(r.url); setIw(r.w); setIh(r.h); setRenderScl(r.scl); setPage(n); setScale(0); setPts([]); }
    catch (e) { setErr("Couldn’t render that page."); }
    setBusy(false);
  };
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    setErr("");
    if (/pdf$/i.test(f.type) || /\.pdf$/i.test(f.name)) {
      if (!pdfReady()) { setErr("PDF engine didn’t load — check your connection, then re-import."); e.target.value = ""; return; }
      const rd = new FileReader();
      rd.onload = async () => {
        setBusy(true);
        try { const d = await window.pdfjsLib.getDocument({ data: rd.result }).promise; setDoc(d); setPages(d.numPages); await renderPage(d, 1); }
        catch (err2) { setErr("Couldn’t read that PDF."); setBusy(false); }
      };
      rd.readAsArrayBuffer(f);
    } else {
      const url = URL.createObjectURL(f);
      const im = new Image();
      im.onload = () => { const w = im.naturalWidth || 1000, h = im.naturalHeight || 680; PLAN_IMG = { url, iw: w, ih: h }; setImg(url); setIw(w); setIh(h); setDoc(null); setPages(0); setRenderScl(0); setScale(0); setPts([]); };
      im.src = url;
    }
    e.target.value = "";
  };

  const applyPlot = (val) => { const D = parseFloat(val != null ? val : plotScale) || 0; if (renderScl > 0 && D > 0) setScale((1000 * renderScl * 72) / (25.4 * D)); };
  const applyKnown = () => { if (pts.length < 2) return; const px = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y); const L = parseFloat(scaleLen) || 0; if (px > 0 && L > 0) { setScale(px / L); setMode("measure"); } };

  const svgClick = (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * iw;
    const y = ((e.clientY - r.top) / r.height) * ih;
    setPts((p) => (p.length >= 2 ? [{ x, y }] : [...p, { x, y }]));
  };

  const dist = pts.length === 2 ? Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y) : 0;
  const measuredM = scale > 0 && dist > 0 ? dist / scale : null;
  const areaM2 = scale > 0 && pts.length === 2 ? (Math.abs(pts[1].x - pts[0].x) / scale) * (Math.abs(pts[1].y - pts[0].y) / scale) : null;
  const mk = Math.max(5, iw / 220), lw = Math.max(2, iw / 420);

  return (
    <section className="hl-card hl-drawcard">
      <div className="hl-cardhead"><h2>Reference drawing</h2><span className="hl-hint">measure areas off the plan</span></div>
      {!img && <div className="hl-note" style={{ marginBottom: "10px" }}>Import the floor plan to measure glass / wall / floor areas while you fill in the load below. Works with a PDF (vector or scanned) or a photo. The drawing and its scale are shared with the Design → Drawing tab.</div>}
      <div className="hl-drawtools">
        <label className="hl-add" style={{ cursor: "pointer" }}>{img ? "Replace drawing" : "Import PDF / image"}<input type="file" accept="application/pdf,image/*" style={{ display: "none" }} onChange={onFile} /></label>
        {pages > 1 && (<><button className="hl-pbtn" disabled={page <= 1 || busy} onClick={() => doc && renderPage(doc, page - 1)}>‹</button><span className="hl-pageind">sheet {page}/{pages}</span><button className="hl-pbtn" disabled={page >= pages || busy} onClick={() => doc && renderPage(doc, page + 1)}>›</button></>)}
        {img && (<><button className="hl-pbtn" onClick={() => setZoom((z) => Math.max(0.5, z - 0.25))}>−</button><span className="hl-pageind">{Math.round(zoom * 100)}%</span><button className="hl-pbtn" onClick={() => setZoom((z) => Math.min(4, z + 0.25))}>+</button></>)}
      </div>
      {err && <div className="hl-note" style={{ color: "var(--gold)" }}>{err}</div>}
      {busy && <div className="hl-note">Rendering…</div>}
      {img && (<>
        <div className="hl-drawmodes">
          {[["measure", "Measure"], ["area", "Area"], ["scale", "Set scale"]].map(([m, l]) => (
            <button key={m} className={"hl-pbtn" + (mode === m ? " on" : "")} onClick={() => { setMode(m); setPts([]); }}>{l}</button>
          ))}
        </div>
        <div className="hl-drawscroll">
          <svg viewBox={"0 0 " + iw + " " + ih} style={{ width: (zoom * 100) + "%", height: "auto", display: "block", cursor: "crosshair" }} onClick={svgClick}>
            <image href={img} x="0" y="0" width={iw} height={ih} />
            {pts.length === 2 && mode === "area" && <rect x={Math.min(pts[0].x, pts[1].x)} y={Math.min(pts[0].y, pts[1].y)} width={Math.abs(pts[1].x - pts[0].x)} height={Math.abs(pts[1].y - pts[0].y)} fill="rgba(214,170,80,0.18)" stroke="var(--gold)" strokeWidth={lw} />}
            {pts.length === 2 && mode !== "area" && <line x1={pts[0].x} y1={pts[0].y} x2={pts[1].x} y2={pts[1].y} stroke="var(--gold)" strokeWidth={lw} strokeDasharray="8 5" />}
            {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r={mk} fill="var(--gold)" />)}
          </svg>
        </div>
        {renderScl > 0 && (
          <div className="hl-scalebox">
            <div className="hl-note" style={{ marginTop: 0 }}>Drawing scale — tap the one printed on the sheet:</div>
            <div className="hl-presetrow">{[50, 100, 200, 250, 500].map((d) => <button key={d} className={"hl-scalechip" + (Math.round(parseFloat(plotScale)) === d && scale > 0 ? " on" : "")} onClick={() => { setPlotScale(String(d)); applyPlot(d); }}>1:{d}</button>)}</div>
          </div>
        )}
        {mode === "scale" && (
          <div className="hl-scalebox">
            <div className="hl-note">Tap two points on a known length, then set it.</div>
            <div className="hl-field"><label className="hl-lbl">Known length</label><div className="hl-fieldright"><div className="hl-unitfield"><input className="hl-num" type="number" inputMode="decimal" value={scaleLen} onChange={(e) => setScaleLen(e.target.value)} /><span className="hl-suffix">m</span></div><button className="hl-pbtn on" onClick={applyKnown} disabled={pts.length < 2}>Set</button></div></div>
          </div>
        )}
        <div className="hl-meta" style={{ marginTop: "10px" }}>
          <div className="hl-metarow faint"><span>Scale</span><span className="mono">{scale > 0 ? f1(scale) + " px/m" : "not set"}</span></div>
          {mode === "measure" && <div className="hl-metarow strong"><span>Measured</span><span className="mono cold">{measuredM != null ? f1(measuredM) + " m" : (scale > 0 ? "tap two points" : "set a scale first")}</span></div>}
          {mode === "area" && <div className="hl-metarow strong"><span>Area (rectangle)</span><span className="mono cold">{areaM2 != null ? f1(areaM2) + " m²" : (scale > 0 ? "tap two opposite corners" : "set a scale first")}</span></div>}
        </div>
        <div className="hl-note">Measure a wall/opening, or switch to <b>Area</b> and tap two opposite corners of a room/wall/window to read its m² — then type that into the load fields below. Figures are only as accurate as the scale you set; use a true-scale sheet.</div>
      </>)}
    </section>
  );
}

function RoomLoads({ cond, inDB, inRH, inWinter, supDT, setSupDT, setOutlets }) {
  const [rooms, setRooms] = useState(() => loadRooms() || [newRoom("Living"), newRoom("Bed 1"), newRoom("Bed 2")]);
  useEffect(() => { persistRooms(rooms); }, [rooms]);

  const upd = (id, k, v) => setRooms((rs) => rs.map((r) => (r.id === id ? { ...r, [k]: v } : r)));
  const add = () => setRooms((rs) => [...rs, newRoom("Room " + (rs.length + 1))]);
  const del = (id) => setRooms((rs) => (rs.length > 1 ? rs.filter((r) => r.id !== id) : rs));

  const sDB = parseFloat(cond.sDB) || 0, sWB = parseFloat(cond.sWB) || 0, wDB = parseFloat(cond.wDB) || 0;
  const tIn = num(inDB) || 24;
  const dT = Math.max(0, sDB - tIn);
  const dTw = Math.max(0, (num(inWinter) || 21) - wDB);
  const gi = wFromRH(tIn, num(inRH) || 50);
  const go = wFromDBWB(sDB, sWB);
  const dtSup = parseFloat(supDT) || 10;

  const calc = useMemo(() => {
    const calcRoom = (rm) => {
      const a = num(rm.gA), g = GLAZING[rm.gGlaze] || GLAZING.sc, sc = (SHADE[rm.gShade] || SHADE.int).sc;
      const glass = a * SOLAR[rm.gOrient || "N"] * g.shgc * sc + a * g.U * dT;
      const wU = (WALL[rm.wType] || WALL.bvi).U;
      const wall = num(rm.wA) * wU * (dT + (rm.wSun !== false ? WALL_SOL_UPLIFT : 0)) + num(rm.iA) * PARTITION_U * 0.5 * dT;
      const rU = (ROOF[rm.rType] || ROOF.r35).U;
      const roof = num(rm.rA) * rU * (dT + ROOF_SOL_UPLIFT);
      const fl = FLOOR[rm.fType] || FLOOR.slab;
      const floor = num(rm.fA) * fl.U * (fl.f * dT);
      const pp = PEOPLE[rm.pType] || PEOPLE.office;
      const ps = num(rm.pCount) * pp.s, pl = num(rm.pCount) * pp.l;
      const eq = num(rm.eq);
      const ventS = 1.23 * num(rm.oa) * dT, ventL = 3.0 * num(rm.oa) * Math.max(0, go - gi);
      const sensible = glass + wall + roof + floor + ps + eq + ventS;
      const latent = pl + ventL;
      const heat = a * g.U * dTw + (num(rm.wA) * wU + num(rm.iA) * PARTITION_U * 0.5) * dTw + num(rm.rA) * rU * dTw + num(rm.fA) * fl.U * fl.f * dTw + 1.23 * num(rm.oa) * dTw;
      const flow = sensible > 0 ? sensible / (1.213 * dtSup) : 0;
      return { glass, wall, roof, floor, ps, pl, eq, ventS, ventL, sensible, latent, total: sensible + latent, heat, flow };
    };
    const rows = rooms.map((rm) => ({ rm, c: calcRoom(rm) }));
    const sensible = rows.reduce((a, x) => a + x.c.sensible, 0);
    const latent = rows.reduce((a, x) => a + x.c.latent, 0);
    const heat = rows.reduce((a, x) => a + x.c.heat, 0);
    const total = sensible + latent;
    const required = total * SAFETY;
    const unit = UNITS.find((u) => u >= required / 1000) || null;
    const totalFlow = rows.reduce((a, x) => a + x.c.flow, 0);
    const shr = total > 0 ? sensible / total : 0;
    const zones = {};
    rows.forEach((x) => {
      const z = (x.rm.zone || "").trim() || "Unzoned";
      const Z = (zones[z] = zones[z] || { name: z, sensible: 0, total: 0, heat: 0, flow: 0, capC: 0, capH: 0, n: 0 });
      Z.sensible += x.c.sensible; Z.total += x.c.total; Z.heat += x.c.heat; Z.flow += x.c.flow;
      Z.capC += num(x.rm.capC); Z.capH += num(x.rm.capH); Z.n++;
    });
    const zoneList = Object.values(zones).map((z) => ({ ...z, required: z.total * SAFETY, heatReq: z.heat * SAFETY, unit: UNITS.find((u) => u >= (z.total * SAFETY) / 1000) || null }));
    return { rows, sensible, latent, total, required, unit, heat, heatReq: heat * SAFETY, totalFlow, shr, zoneList };
  }, [rooms, cond, inDB, inRH, inWinter, supDT]);

  const applyToDesign = () => {
    setOutlets(calc.rows.map((x, i) => ({ id: OID++, name: x.rm.name || ("Room " + (i + 1)), flow: x.c.flow > 0 ? String(Math.round(x.c.flow)) : "" })));
  };

  const optEntries = (obj) => Object.entries(obj).map(([k, v]) => <option key={k} value={k}>{v.label}</option>);

  return (
    <div className="hl-grid">
      <div className="hl-inputs">
        <section className="hl-card">
          <div className="hl-cardhead"><h2>Conditions</h2><span className="hl-hint">set on Heat load tab</span></div>
          <div className="hl-meta">
            <div className="hl-metarow"><span>Summer / indoor</span><span className="mono cold">{f1c(sDB)}°C → {f1c(tIn)}°C · ΔT {f1c(dT)} K</span></div>
            <div className="hl-metarow faint"><span>Winter ΔT</span><span className="mono">{f1c(dTw)} K</span></div>
          </div>
          <Field label="Supply air ΔT" suffix="K" value={supDT} onChange={setSupDT} note="cooling, for L/s" />
        </section>

        {rooms.map((rm, i) => {
          const c = calc.rows[i] ? calc.rows[i].c : null;
          return (
            <section className="hl-card" key={rm.id}>
              <div className="hl-cardhead">
                <input className="hl-jobinput" style={{ padding: "8px 11px", fontSize: "14px", fontWeight: 700, maxWidth: "62%" }} value={rm.name} onChange={(e) => upd(rm.id, "name", e.target.value)} placeholder={"Room " + (i + 1)} />
                <button className="hl-del win" onClick={() => del(rm.id)} aria-label="Remove room">×</button>
              </div>
              <div className="hl-roomgrid">
                <div className="hl-rf"><label>Zone / system</label><input className="hl-sel" style={{ minWidth: "120px" }} value={rm.zone || ""} onChange={(e) => upd(rm.id, "zone", e.target.value)} placeholder="e.g. Upstairs" /></div>
                <div className="hl-rf"><label>Glass m²</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.gA} onChange={(e) => upd(rm.id, "gA", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Facing</label><select className="hl-sel" value={rm.gOrient} onChange={(e) => upd(rm.id, "gOrient", e.target.value)}>{ORIENTS.map((o) => <option key={o} value={o}>{o}</option>)}</select></div>
                <div className="hl-rf"><label>Glazing</label><select className="hl-sel" value={rm.gGlaze} onChange={(e) => upd(rm.id, "gGlaze", e.target.value)}>{optEntries(GLAZING)}</select></div>
                <div className="hl-rf"><label>Shading</label><select className="hl-sel" value={rm.gShade} onChange={(e) => upd(rm.id, "gShade", e.target.value)}>{optEntries(SHADE)}</select></div>
                <div className="hl-rf"><label>Ext wall m²</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.wA} onChange={(e) => upd(rm.id, "wA", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Wall type</label><select className="hl-sel" value={rm.wType} onChange={(e) => upd(rm.id, "wType", e.target.value)}>{optEntries(WALL)}</select></div>
                <div className="hl-rf"><label>Sunlit</label><button className={"hl-toggle" + (rm.wSun !== false ? " on" : "")} onClick={() => upd(rm.id, "wSun", !(rm.wSun !== false))}>{rm.wSun !== false ? "Yes" : "No"}</button></div>
                <div className="hl-rf"><label>Internal wall m²</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.iA} onChange={(e) => upd(rm.id, "iA", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Roof m²</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.rA} onChange={(e) => upd(rm.id, "rA", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Roof type</label><select className="hl-sel" value={rm.rType} onChange={(e) => upd(rm.id, "rType", e.target.value)}>{optEntries(ROOF)}</select></div>
                <div className="hl-rf"><label>Floor m²</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.fA} onChange={(e) => upd(rm.id, "fA", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Floor type</label><select className="hl-sel" value={rm.fType} onChange={(e) => upd(rm.id, "fType", e.target.value)}>{optEntries(FLOOR)}</select></div>
                <div className="hl-rf"><label>People</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="numeric" value={rm.pCount} onChange={(e) => upd(rm.id, "pCount", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Activity</label><select className="hl-sel" value={rm.pType} onChange={(e) => upd(rm.id, "pType", e.target.value)}>{optEntries(PEOPLE)}</select></div>
                <div className="hl-rf"><label>Lights+equip W</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.eq} onChange={(e) => upd(rm.id, "eq", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Outside air L/s</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.oa} onChange={(e) => upd(rm.id, "oa", e.target.value)} placeholder="0" /></div></div>
                <div className="hl-rf"><label>Cooling kW fitted</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.capC} onChange={(e) => upd(rm.id, "capC", e.target.value)} placeholder="—" /></div></div>
                <div className="hl-rf"><label>Heating kW fitted</label><div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={rm.capH} onChange={(e) => upd(rm.id, "capH", e.target.value)} placeholder="—" /></div></div>
              </div>
              {c && (
                <div className="hl-meta" style={{ marginTop: "11px" }}>
                  <div className="hl-metarow strong"><span>Room sensible</span><span className="mono warm">{fmtW(c.sensible)} W</span></div>
                  <div className="hl-metarow"><span>Total (sens + lat)</span><span className="mono">{fmtW(c.total)} W</span></div>
                  <div className="hl-metarow strong"><span>Supply air</span><span className="mono cold">{Math.round(c.flow)} L/s</span></div>
                  {num(rm.capC) > 0 && <div className="hl-metarow"><span>Cooling fitted</span><span className="mono" style={{ color: num(rm.capC) >= c.total / 1000 ? "var(--teal)" : "var(--gold)" }}>{f1c(num(rm.capC))} kW {num(rm.capC) >= c.total / 1000 ? "✓ covers" : "· under"}</span></div>}
                  {num(rm.capH) > 0 && <div className="hl-metarow"><span>Heating fitted</span><span className="mono" style={{ color: num(rm.capH) >= c.heat / 1000 ? "var(--teal)" : "var(--gold)" }}>{f1c(num(rm.capH))} kW {num(rm.capH) >= c.heat / 1000 ? "✓ covers" : "· under"}</span></div>}
                </div>
              )}
            </section>
          );
        })}
        <div className="hl-ductbtns"><button className="hl-add" onClick={add}>+ Add room</button></div>
      </div>

      <div className="hl-results">
        <div className="hl-resultcard">
          <div className="hl-eyebrow">Block load — all rooms</div>
          <div className="hl-big" style={{ fontSize: "44px" }}>{fmtKW(calc.required)}<span className="hl-bigunit">kW</span></div>
          <div className="hl-reqline">{rooms.length} room{rooms.length === 1 ? "" : "s"} · sensible {fmtKW(calc.sensible)} + latent {fmtKW(calc.latent)} kW · ×{SAFETY} safety</div>
          <div className="hl-metarow strong"><span>Cooling required</span><span className="mono cold">{fmtKW(calc.required)} kW</span></div>
          <div className="hl-metarow"><span>SHR</span><span className="mono">{calc.shr ? calc.shr.toFixed(2) : "—"}</span></div>
          <div className="hl-metarow"><span>Suggested unit</span><span className="mono cold">{calc.unit ? calc.unit.toFixed(1) + " kW" : "—"}</span></div>
          <div className="hl-metarow"><span>Heating required</span><span className="mono warm">{fmtKW(calc.heatReq)} kW</span></div>
          <div className="hl-metarow strong"><span>Total supply air</span><span className="mono cold">{Math.round(calc.totalFlow)} L/s</span></div>
          <button className="hl-pbtn on" style={{ marginTop: "12px", width: "100%" }} onClick={applyToDesign} disabled={calc.totalFlow <= 0}>Send room airflows → design</button>
          <p className="hl-foot">Each room uses the same DA09-style coefficients as the Heat load tab (solar, glazing, U-values, sol-air uplift, people, outside air). Room sensible ÷ (1.213 × ΔT) gives its supply air. "Send to design" fills the shared room list — then on the Plan tab tap <b>Seed from rooms</b> to drop a diffuser per room at its airflow, or read the L/s here and type it on your drawn diffusers. Block load sizes the unit; a per-room single-block whole-house figure is on the Heat load tab. No diversity or duct heat-gain allowance — verify against a full DA09 for tender work. Saved on this device.</p>
        </div>

        {calc.zoneList.length > 1 && (
          <div className="hl-resultcard" style={{ marginTop: "14px" }}>
            <div className="hl-eyebrow">By area / system</div>
            {calc.zoneList.map((z) => (
              <div key={z.name} style={{ padding: "10px 0", borderTop: "1px solid var(--line-soft)" }}>
                <div className="hl-metarow strong"><span>{z.name}</span><span className="mono cold">{fmtKW(z.required)} kW</span></div>
                <div className="hl-metarow faint"><span>{z.n} room{z.n === 1 ? "" : "s"} · supply air</span><span className="mono">{Math.round(z.flow)} L/s</span></div>
                <div className="hl-metarow faint"><span>Suggested unit</span><span className="mono cold">{z.unit ? z.unit.toFixed(1) + " kW" : "—"}</span></div>
                {z.capC > 0 && <div className="hl-metarow faint"><span>Cooling fitted</span><span className="mono" style={{ color: z.capC >= z.total / 1000 ? "var(--teal)" : "var(--gold)" }}>{f1c(z.capC)} kW {z.capC >= z.total / 1000 ? "✓ covers" : "· under"}</span></div>}
                <div className="hl-metarow faint"><span>Heating required</span><span className="mono warm">{fmtKW(z.heatReq)} kW</span></div>
                {z.capH > 0 && <div className="hl-metarow faint"><span>Heating fitted</span><span className="mono" style={{ color: z.capH >= z.heat / 1000 ? "var(--teal)" : "var(--gold)" }}>{f1c(z.capH)} kW {z.capH >= z.heat / 1000 ? "✓ covers" : "· under"}</span></div>}
              </div>
            ))}
            <p className="hl-foot">Give rooms the same <b>Zone / system</b> name to group them into a building area (e.g. "Upstairs", "Unit 1"). Each area totals its own load, suggested unit and airflow — so one building can run several systems. <b>Fitted kW</b> is the equipment you plan to install; green means it covers that area's calculated load.</p>
          </div>
        )}
      </div>
    </div>
  );
}

function f1c(x) { return (x || x === 0) ? Number(x).toFixed(1) : "—"; }

function Field({ label, suffix, value, onChange, note }) {
  return (
    <div className="hl-field">
      <label className="hl-lbl">{label}</label>
      <div className="hl-fieldright">
        <div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal"
          value={value} onChange={(e) => onChange(e.target.value)} placeholder="0" /><span className="hl-suffix">{suffix}</span></div>
        {note && <span className="hl-note">{note}</span>}
      </div>
    </div>
  );
}
function CondField({ label, suffix, value, onChange }) {
  return (
    <div className="hl-condfield">
      <label className="hl-condlbl">{label}</label>
      <div className="hl-unitfield xs"><input className="hl-num xs" type="number" inputMode="decimal"
        value={value} onChange={(e) => onChange(e.target.value)} /><span className="hl-suffix">{suffix}</span></div>
    </div>
  );
}
function ConstructRow({ label, typeOpts, type, area, onType, onArea, u }) {
  return (
    <div className="hl-field">
      <label className="hl-lbl">{label}</label>
      <div className="hl-fieldright">
        <select className="hl-sel" value={type} onChange={(e) => onType(e.target.value)}>
          {Object.entries(typeOpts).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <div className="hl-unitfield sm"><input className="hl-num sm" type="number" min="0" inputMode="decimal"
          value={area} onChange={(e) => onArea(e.target.value)} placeholder="0" /><span className="hl-suffix">m²</span></div>
        <span className="hl-note u">U {u}</span>
      </div>
    </div>
  );
}

.hl-empty{margin-top:14px; color:var(--muted); font-size:13.5px; line-height:1.6; position:relative; z-index:1;}
.hl-foot{max-width:392px; margin:2px 0 0; font-size:11.5px; color:var(--faint); line-height:1.6;}

.hl-tabs{max-width:1100px; margin:0 auto 16px; display:flex; gap:8px; flex-wrap:wrap;}
.hl-subtabs{max-width:1100px; margin:0 auto 14px; display:inline-flex; gap:4px; background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:4px;}
.hl-subtab{background:transparent; border:none; color:var(--muted); border-radius:8px; padding:8px 18px; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap;}
.hl-subtab:hover{color:var(--ink);}
.hl-subtab.on{background:var(--graphite); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.3);}
.hl-tab{flex:1; background:var(--panel); border:1px solid var(--line); color:var(--muted); border-radius:11px; padding:11px 14px; font-size:13px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; transition:.15s;}
.hl-tab.on{color:var(--ink); border-color:var(--teal-deep); background:linear-gradient(180deg,#0e2036,#0a1426); box-shadow:inset 0 0 0 1px rgba(47,182,196,.25);}

.hl-fanlist{display:flex; flex-direction:column; gap:10px;}
.hl-fanseg{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:11px;}
.hl-fanhead{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
.hl-fanfields{display:flex; gap:8px; flex-wrap:wrap;}
.hl-fanrowout{display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; font-size:12px;}
.hl-fanrowout .faintc{color:var(--faint);}
.hl-fanfit{display:flex; flex-direction:column; gap:6px; margin-top:9px; padding-top:9px; border-top:1px solid var(--line-soft);}
.hl-fitrow{display:flex; align-items:center; gap:7px;}
.hl-fitname{flex:1 1 auto; font-size:12px; color:var(--muted); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.hl-ductbtns{display:flex; gap:9px; flex-wrap:wrap; margin-top:11px;}
.hl-ductbtns .hl-add{margin-top:0;}
.hl-add:disabled{opacity:.4; cursor:not-allowed;}
.hl-toggle{background:var(--panel2); border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:8px 18px; font-size:13px; cursor:pointer; transition:.15s;}
.hl-toggle.on{color:#04222b; background:var(--teal); border-color:var(--teal); font-weight:700;}
.hl-roomgrid{display:flex; gap:10px 12px; flex-wrap:wrap; align-items:flex-end;}
.hl-rf{display:flex; flex-direction:column; gap:5px;}
.hl-rf>label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); font-weight:600;}
.hl-rf .hl-num{width:84px; padding-right:12px; text-align:right;}
.hl-rf .hl-sel{max-width:none; min-width:118px;}
.hl-rf .hl-toggle{padding:9px 16px;}
.hl-presetrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:7px;}
.hl-scalechip{background:var(--panel2); border:1px solid var(--line); color:var(--muted); border-radius:7px; padding:7px 12px; font-size:12.5px; cursor:pointer; font-family:ui-monospace,Menlo,monospace; transition:.15s;}
.hl-scalechip:hover{border-color:var(--teal); color:var(--ink);}
.hl-scalechip.on{background:var(--teal); border-color:var(--teal); color:#04222b; font-weight:700;}
.hl-drawcard{max-width:1100px; margin:0 auto 14px;}
.hl-drawtools{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px;}
.hl-drawmodes{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
.hl-pageind{font-size:12px; color:var(--muted); font-family:ui-monospace,Menlo,monospace;}
.hl-drawscroll{overflow:auto; max-height:62vh; border:1px solid var(--line); border-radius:10px; background:#0b1320;}
.hl-schemwrap{margin-top:14px; overflow-x:auto; border:1px solid var(--line); border-radius:12px; background:rgba(8,16,30,.5); padding:10px 8px;}
.hl-schem{width:100%; min-width:300px; height:auto; display:block;}
.hl-segtable{margin-top:16px; font-size:12.5px;}
.hl-segrow{display:grid; grid-template-columns:1.7fr .55fr .6fr .55fr .6fr; gap:6px; padding:7px 2px; border-bottom:1px solid var(--line-soft); align-items:center;}
.hl-segrow.rect{grid-template-columns:1.5fr .5fr .55fr .5fr .55fr .9fr;}
.hl-seghead{color:var(--faint); font-size:10px; text-transform:uppercase; letter-spacing:.06em;}
.hl-segname{color:var(--ink);}
.hl-segrow span:not(.hl-segname){text-align:right;}
@media (max-width:900px){
  .hl-root{padding:20px 14px 36px;}
  .hl-logo{height:60px;}
  .hl-grid{grid-template-columns:1fr;}
  .hl-results{position:static;}
  .hl-claw{display:none;}
  .hl-field{flex-wrap:wrap; align-items:flex-start;}
  .hl-sel{max-width:none;}
}
@media (prefers-reduced-motion:reduce){ .hl-barseg{transition:none;} }

.hl-plan{max-width:1100px; margin:0 auto; display:flex; flex-direction:column; gap:16px;}
.hl-plantools{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:8px;}
.hl-pbtn{background:var(--panel); border:1px solid var(--line); color:var(--muted); border-radius:9px; padding:8px 12px; font-size:12.5px; font-weight:700; cursor:pointer; transition:.15s;}
.hl-pbtn.on{color:#04222b; background:var(--teal); border-color:var(--teal);}
.hl-pbtn.danger{color:var(--red);}
.hl-pbtn.file{display:inline-flex; align-items:center;}
.hl-pbtn[disabled]{opacity:.4; cursor:not-allowed;}
.hl-planhint{font-size:12px; color:var(--gold); margin-bottom:8px; min-height:16px;}
.hl-zoomrow{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); margin-bottom:10px; flex-wrap:wrap;}
.hl-zoomrow input[type=range]{flex:1; min-width:120px; accent-color:var(--teal);}
.hl-scaleinfo{color:var(--faint); margin-left:auto;}
.hl-planwrap{border:1px solid var(--line); border-radius:12px; background:#0a1426; overflow:auto; max-height:72vh; -webkit-overflow-scrolling:touch;}
.hl-plansvg{display:block;}
.hl-dimrow{display:flex; align-items:center; gap:6px;}
.hl-dimrow input{max-width:70px;}
.hl-x{color:var(--muted); font-size:13px;}
.hl-plancard.maxed{position:fixed; inset:0; z-index:9999; margin:0; max-width:none; width:auto; border-radius:0; overflow:auto; background:var(--bg); padding:12px;}
.hl-plancard.maxed .hl-planwrap{max-height:calc(100vh - 168px);}
.hl-plancard:fullscreen{overflow:auto; background:var(--bg); padding:12px;}
.hl-plancard:fullscreen .hl-planwrap{max-height:calc(100vh - 168px);}
.hl-scalebox,.hl-selbox{margin-top:12px; border-top:1px solid var(--line-soft); padding-top:12px;}
.hl-warn{margin-top:10px; padding:9px 11px; border-radius:9px; background:rgba(236,37,48,.10); border:1px solid rgba(236,37,48,.35); color:#ff9aa0; font-size:12px;}
.hl-warn.soft{background:rgba(236,196,99,.08); border-color:rgba(236,196,99,.3); color:var(--gold);}

/* --- jobs / PDF toolbar --- */
.hl-toolbar{max-width:1100px; margin:0 auto 16px; display:flex; flex-wrap:wrap; gap:9px; align-items:center;}
.hl-tbtn{background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap;}
.hl-tbtn:hover{border-color:var(--teal-deep);}
.hl-tbtn.ghost{color:var(--muted);}
.hl-tbtn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-deep)); color:#241c05; border-color:var(--gold-deep); font-weight:700;}
.hl-tbtn[disabled]{opacity:.4; cursor:not-allowed;}
.hl-tsel{background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:9px 12px; font-size:13px; cursor:pointer; min-width:180px;}
.hl-thint{color:var(--gold); font-size:12px;}
.hl-pdfbar{max-width:1100px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:8px;}
.hl-pchip{font-size:12px; color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:5px 10px;}
.hl-pchip.err{color:#ff9aa0; border-color:rgba(236,37,48,.4);}
.hl-pager{display:inline-flex; align-items:center; gap:7px;}
.hl-detbox{margin-top:10px; border-top:1px solid var(--line-soft); padding-top:10px;}
.hl-chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:7px;}
.hl-chip{display:inline-flex; align-items:center; gap:7px; background:var(--panel2); border:1px solid var(--teal-deep); color:var(--teal); border-radius:8px; padding:6px 11px; font-size:12.5px; font-weight:600; cursor:pointer;}
.hl-chip:hover{background:rgba(95,227,216,.12);}
.hl-chippg{font-size:11px; font-weight:600; color:var(--gold); background:rgba(236,196,99,.10); border:1px solid var(--gold-deep); border-radius:6px; padding:1px 7px;}
.hl-chippg:hover{background:rgba(236,196,99,.22);}

/* --- printable quote: hidden on screen, shown only when printing --- */
.hl-print{display:none;}
@media print{
  @page{margin:14mm;}
  .hl-root{padding:0!important; background:#fff!important; color:#111!important;}
  .hl-root > *:not(.hl-print){display:none!important;}
  .hl-print{display:block; color:#111; font-size:12px; line-height:1.45;}
  .qp-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #111; padding-bottom:10px; margin-bottom:16px;}
  .qp-logo{height:62px; width:auto; filter:none;}
  .qp-title{text-align:right;}
  .qp-title h1{margin:0; font-size:18px;} .qp-title p{margin:3px 0 0; font-size:11px; color:#555;}
  .qp-sec{margin:0 0 15px;}
  .qp-sec h2{font-size:13px; margin:0 0 7px; border-bottom:1px solid #bbb; padding-bottom:3px;}
  .qp-grid{display:grid; grid-template-columns:1fr 1fr; gap:2px 28px;}
  .qp-row{display:flex; justify-content:space-between; gap:14px; padding:3px 0; border-bottom:1px dotted #ddd;}
  .qp-row span{color:#555;} .qp-row b{font-variant-numeric:tabular-nums;}
  .qp-big{font-size:15px;}
  table.qp-tbl{width:100%; border-collapse:collapse; font-size:11px;}
  table.qp-tbl th, table.qp-tbl td{border:1px solid #ccc; padding:4px 7px; text-align:left;}
  table.qp-tbl th{background:#eee;}
  table.qp-tbl td.r, table.qp-tbl th.r{text-align:right; font-variant-numeric:tabular-nums;}
  .qp-foot{margin-top:18px; font-size:10px; color:#666; border-top:1px solid #ccc; padding-top:8px;}
}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<HeatLoadEstimator/>);
</script>
</body>
</html>
