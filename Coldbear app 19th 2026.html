// ---- psychrometrics ----
const psat = (T) => 0.61078 * Math.exp((17.27 * T) / (T + 237.3)); // kPa
const wFromRH = (T, rh) => { const pw = (rh / 100) * psat(T); return (622 * pw) / (101.325 - pw); };
const wFromDBWB = (db, wb) => { let pw = psat(wb) - 0.000662 * 101.325 * (db - wb); pw = Math.max(pw, 0.05); return (622 * pw) / (101.325 - pw); };

const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) && n > 0 ? n : 0; };

const fmtKW = (w) => (w / 1000).toFixed(1);

/* ---------- Duct design helpers (AIRAH equal-friction / velocity method) ---------- */
const STD_ROUND = [100,125,150,160,180,200,225,250,280,300,315,355,400,450,500,560,600,630,710,800,900,1000,1120,1250];
const RHO = 1.2, NU = 1.5e-5; // air @20C, kinematic viscosity
// AIRAH DA3 Table 3-40A — absolute surface roughness ks (m); friction chart Fig 3-40A is based on galvanised 0.15 mm
const KS = { galv: 0.00015, alum: 0.00005, flex: 0.0009 };
const MAT_LABEL = { galv: "Galvanised", alum: "Aluminium", flex: "Flexible" };
// AIRAH DA3 Table 5-100A — recommended max duct velocities (m/s) for low-velocity systems, by NR of the served space
const NR_LIMITS = {
  "30": { main: 5.0, branch: 4.0, ret: 3.0, label: "NR30 · bedrooms, quiet studies" },
  "35": { main: 6.5, branch: 5.0, ret: 4.0, label: "NR35 · living areas, private offices" },
  "40": { main: 8.0, branch: 6.0, ret: 5.0, label: "NR40 · open offices, retail" },
  "45": { main: 9.0, branch: 7.0, ret: 6.0, label: "NR45 · shops, busy areas" },
  "50": { main: 10.0, branch: 8.0, ret: 6.0, label: "NR50 · workshops, noisy areas" },
};
let OID = 100;
const velRound = (Q, D) => (D > 0 ? 1273 * Q / (D * D) : 0); // m/s ; Q in L/s, D in mm (AIRAH)
function frictionPaPerM(Q, Dmm, ks) {
  const D = Dmm / 1000, q = Q / 1000;
  const A = Math.PI * D * D / 4, v = A > 0 ? q / A : 0;
  if (v <= 0) return 0;
  const Re = v * D / NU;
  const k = (ks == null ? KS.galv : ks);
  const f = 0.25 / Math.pow(Math.log10(k / (3.7 * D) + 5.74 / Math.pow(Re, 0.9)), 2);
  return f * (RHO * v * v) / (2 * D);
}
function diaForFriction(Q, targetPa, ks) {
  let lo = 50, hi = 1400;
  for (let i = 0; i < 60; i++) { const m = (lo + hi) / 2; if (frictionPaPerM(Q, m, ks) > targetPa) lo = m; else hi = m; }
  return (lo + hi) / 2;
}
const diaForVel = (Q, v) => (v > 0 ? Math.sqrt(1273 * Q / v) : 0);
const nextStd = (mm) => STD_ROUND.find((x) => x >= mm) || STD_ROUND[STD_ROUND.length - 1];
function rectWidth(De, b) {
  let lo = 50, hi = 2000;
  for (let i = 0; i < 60; i++) { const a = (lo + hi) / 2; const de = 1.30 * Math.pow(a * b, 0.625) / Math.pow(a + b, 0.25); if (de < De) lo = a; else hi = a; }
  return Math.round(((lo + hi) / 2) / 10) * 10;
}

/* ---------- Duct calc (shared by the Duct tab and the printable quote) ---------- */
function computeDuct(outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch) {
  const lim = NR_LIMITS[nr];
  const ks = KS[mat];
  const flows = outlets.map((o) => Math.max(0, parseFloat(o.flow) || 0));
  const total = flows.reduce((a, b) => a + b, 0);
  const target = parseFloat(paRate) || 1;
  const tvMain = parseFloat(vMain) || lim.main;
  const tvBranch = parseFloat(vBranch) || lim.branch;
  const b = parseFloat(rectH) || 200;
  const sizeOne = (Q, role) => {
    if (Q <= 0) return null;
    const vmax = role === "main" ? lim.main : lim.branch;     // NR acoustic limit (for status)
    const vtar = role === "main" ? tvMain : tvBranch;          // velocity-method sizing target
    const dia = method === "ef" ? diaForFriction(Q, target, ks) : diaForVel(Q, vtar);
    const std = nextStd(dia);
    const v = velRound(Q, std);
    const pa = frictionPaPerM(Q, std, ks);
    const status = v > vmax ? "over" : v > vmax * 0.85 ? "warn" : "ok";
    return { dia: std, v, pa, status, rectW: rectWidth(std, b), b };
  };
  const segs = outlets.map((o, k) => {
    const carried = flows.slice(k).reduce((a, c) => a + c, 0);
    return { label: k === 0 ? "Main — trunk" : "Main — after " + (outlets[k - 1].name || ("Outlet " + k)), Q: carried, s: sizeOne(carried, "main") };
  });
  const branches = outlets.map((o, i) => ({ label: o.name || ("Outlet " + (i + 1)), Q: flows[i], s: sizeOne(flows[i], "branch") }));
  const L = parseFloat(runLen) || 0;
  const TERMINAL = 25; // DA3 sizing example assumes 25 Pa terminal/diffuser loss
  const straight = method === "ef" ? target * L : (segs[0] && segs[0].s ? segs[0].s.pa * L : 0);
  const indexPa = straight + TERMINAL;
  return { lim, mat, total, segs, branches, indexPa, straight, terminal: TERMINAL, L };
}

/* ---------- Return air grille sizing (DA3 face-velocity method) ---------- */
// Recommended return-grille core (free-area) face velocities by NR of the served space.
const RA_FACE = { "30": 1.5, "35": 2.0, "40": 2.5, "45": 3.0, "50": 3.5 };
// Common nominal grille face sizes (mm, W x H).
const RA_SIZES = [[300,300],[400,200],[400,400],[500,300],[500,400],[600,300],[600,400],[600,600],[700,400],[800,400],[900,400],[1000,400],[1000,600],[1200,400],[1200,600],[1200,900],[1500,600]];
function sizeReturnGrille(Q, vFace, freeFactor) {
  if (!(Q > 0) || !(vFace > 0)) return null;
  const qm = Q / 1000;                       // m3/s
  const ff = freeFactor > 0 ? freeFactor : 0.75;
  const freeA = qm / vFace;                   // m2 of free area required
  const grossNeeded = freeA / ff;             // m2 gross face required
  let pick = null;
  for (const [w, h] of RA_SIZES) { if ((w * h) / 1e6 >= grossNeeded) { pick = { w, h }; break; } }
  if (!pick) { const s = RA_SIZES[RA_SIZES.length - 1]; pick = { w: s[0], h: s[1] }; }
  const vActual = qm / (((pick.w * pick.h) / 1e6) * ff);
  return { freeA, grossNeeded, w: pick.w, h: pick.h, vActual, over: vActual > vFace * 1.05 };
}

/* ---------- Grille / diffuser types ---------- */
// Free-area fractions are typical catalogue values; slot diffusers size by active length.
const GRILLE_TYPES = {
  egg:   { label: "Egg-crate return", free: 0.85, mode: "face" },
  bar:   { label: "Bar grille",       free: 0.75, mode: "face" },
  blade: { label: "Blade / louvre",   free: 0.70, mode: "face" },
  perf:  { label: "Perforated face",  free: 0.50, mode: "face" },
  slot:  { label: "Slot diffuser",    mode: "slot", lpm: 25 },
};
const SUP_FACE = 3.0; // typical supply-outlet face velocity (m/s)
function sizeGrille(Q, typeKey, vFace, lpm) {
  const t = GRILLE_TYPES[typeKey] || GRILLE_TYPES.egg;
  if (!(Q > 0)) return null;
  if (t.mode === "slot") {
    const rate = lpm > 0 ? lpm : t.lpm;            // L/s per metre of active slot
    return { mode: "slot", lengthM: Q / rate, rate, label: t.label };
  }
  const g = sizeReturnGrille(Q, vFace, t.free);
  return g ? { mode: "face", free: t.free, label: t.label, ...g } : null;
}

// Distinct SVG symbol per diffuser/grille type, centred at (x,y).
// hw/hh = half-width/height in px; omit for the default schematic size.
function outletGlyph(x, y, gtype, isRet, stroke, sw, hw, hh) {
  const acc = isRet ? "var(--teal)" : "var(--gold)";
  const scaled = hw != null || hh != null;
  const HW = hw != null ? Math.max(3, hw) : 14, HH = hh != null ? Math.max(3, hh) : 14;
  const box = <rect x={x - HW} y={y - HH} width={2 * HW} height={2 * HH} rx={Math.max(1, Math.min(4, HW / 3, HH / 3))} fill="#0f1d31" stroke={stroke} strokeWidth={sw} />;
  if (gtype === "slot") {
    const sh = hh != null ? Math.max(3, hh) : 7;
    return (<g>
      <rect x={x - HW} y={y - sh} width={2 * HW} height={2 * sh} rx={Math.max(1, Math.min(3, sh))} fill="#0f1d31" stroke={stroke} strokeWidth={sw} />
      <line x1={x - HW * 0.85} y1={y} x2={x + HW * 0.85} y2={y} stroke={acc} strokeWidth="1.4" />
    </g>);
  }
  if (gtype === "bar") return (<g>{box}{[1, 2, 3].map((i) => { const fx = x - HW + (2 * HW * i) / 4; return <line key={i} x1={fx} y1={y - HH * 0.6} x2={fx} y2={y + HH * 0.6} stroke={acc} strokeWidth="1.4" />; })}</g>);
  if (gtype === "blade") return (<g>{box}{[-1, 0, 1].map((i) => <line key={i} x1={x - HW * 0.6} y1={y + i * HH * 0.5 + HH * 0.16} x2={x + HW * 0.6} y2={y + i * HH * 0.5 - HH * 0.16} stroke={acc} strokeWidth="1.3" />)}</g>);
  if (gtype === "perf") { const r = Math.max(1, Math.min(1.7, HW / 16)); const d = []; [-1, 0, 1].forEach((ix) => [-1, 0, 1].forEach((iy) => d.push(<circle key={ix + "_" + iy} cx={x + ix * HW * 0.55} cy={y + iy * HH * 0.55} r={r} fill={acc} />))); return (<g>{box}{d}</g>); }
  if (gtype === "egg") { const ls = []; [-1, 0, 1].forEach((i) => { ls.push(<line key={"h" + i} x1={x - HW * 0.72} y1={y + i * HH * 0.5} x2={x + HW * 0.72} y2={y + i * HH * 0.5} stroke={acc} strokeWidth="1.1" />); ls.push(<line key={"v" + i} x1={x + i * HW * 0.5} y1={y - HH * 0.72} x2={x + i * HW * 0.5} y2={y + HH * 0.72} stroke={acc} strokeWidth="1.1" />); }); return (<g>{box}{ls}</g>); }
  if (isRet) return (<g>{box}{[-1, 0, 1].map((i) => <line key={i} x1={x - HW * 0.6} y1={y + i * HH * 0.45} x2={x + HW * 0.6} y2={y + i * HH * 0.45} stroke={acc} strokeWidth="1.4" />)}</g>);
  if (scaled) return (<g>{box}<line x1={x - HW * 0.6} y1={y} x2={x + HW * 0.6} y2={y} stroke={acc} strokeWidth="1.3" /><line x1={x} y1={y - HH * 0.6} x2={x} y2={y + HH * 0.6} stroke={acc} strokeWidth="1.3" /></g>);
  return (<g>
    <rect x={x - 13} y={y - 13} width="26" height="26" rx="4" fill="#0f1d31" stroke={stroke} strokeWidth={sw} transform={"rotate(45 " + x + " " + y + ")"} />
    <line x1={x - 7} y1={y} x2={x + 7} y2={y} stroke={acc} strokeWidth="1.4" />
    <line x1={x} y1={y - 7} x2={x} y2={y + 7} stroke={acc} strokeWidth="1.4" />
  </g>);
}

/* Device sizing: if a fixed dimension is chosen, report the resulting face velocity (or slot rate);
   otherwise fall back to the auto sizer (sizeGrille). */
const SLOT_LENGTHS = [600, 900, 1200, 1500, 1800, 2400];
function deviceInfo(Q, gtype, gsize, vFace, lpm) {
  const t = GRILLE_TYPES[gtype] || GRILLE_TYPES.egg;
  if (t.mode === "slot") {
    if (gsize) { const Lm = (parseFloat(gsize) || 0) / 1000; const rate = (Lm > 0 && Q > 0) ? Q / Lm : 0; return { mode: "slot", fixed: true, lengthM: Lm, rate, label: t.label }; }
    return sizeGrille(Q, gtype, vFace, lpm);
  }
  if (gsize) {
    const parts = String(gsize).split("x"); const w = parseFloat(parts[0]) || 0, h = parseFloat(parts[1]) || 0;
    const free = t.free || 0.85; const area = (w * h) / 1e6;
    const v = (Q > 0 && area > 0) ? (Q / 1000) / (area * free) : 0;
    return { mode: "face", fixed: true, w, h, free, vActual: v, over: v > vFace * 1.05, label: t.label };
  }
  return sizeGrille(Q, gtype, vFace, lpm);
}

// Common indoor-unit footprints (mm). Editable; just a quick-pick.
const UNIT_SIZES = [[600, 600], [840, 840], [950, 950], [1100, 450], [1200, 600], [1340, 675], [1600, 700]];
// Real footprint in pixels for a device, given a drawing scale (px per metre).
// Returns {hw,hh} half-extents, or null when no scale / no dimension.
function dimPx(gtype, gsize, scale) {
  if (!(scale > 0) || !gsize) return null;
  const t = GRILLE_TYPES[gtype] || {};
  if (t.mode === "slot") { const L = (parseFloat(gsize) || 0) / 1000; return L > 0 ? { hw: (L * scale) / 2, hh: Math.max(3, (0.1 * scale) / 2) } : null; }
  const p = String(gsize).split("x"); const w = (parseFloat(p[0]) || 0) / 1000, h = (parseFloat(p[1]) || 0) / 1000;
  return (w > 0 && h > 0) ? { hw: (w * scale) / 2, hh: (h * scale) / 2 } : null;
}

async function pdfPageToImg(doc, pageNo, scl) {
  const page = await doc.getPage(pageNo);

  const [mat, setMat] = useState("galv");
  const [method, setMethod] = useState("ef");
  const [paRate, setPaRate] = useState("1");
  const [vMain, setVMain] = useState("");
  const [vBranch, setVBranch] = useState("");
  const [supDT, setSupDT] = useState("10");
  const [runLen, setRunLen] = useState("20");
  const [rectH, setRectH] = useState("200");
  const [ceil, setCeil] = useState("");
  const [jobs, setJobs] = useState(() => loadJobs());
  const [selJob, setSelJob] = useState("");
  const [storeOk, setStoreOk] = useState(true);

  const pickLoc = (i) => {
    setLoc(i);
    setCond({ sDB: LOCATIONS[i].sDB, sWB: LOCATIONS[i].sWB, wDB: LOCATIONS[i].wDB });
  };

  const r = useMemo(() => {
    const sDB = parseFloat(cond.sDB) || 0;
    const sWB = parseFloat(cond.sWB) || 0;
    const wDB = parseFloat(cond.wDB) || 0;
    const tIn = num(inDB) || 24;
    const dT = Math.max(0, sDB - tIn);

    let glass = 0;
    windows.forEach((w) => {
      const a = num(w.area), g = GLAZING[w.glaze], sc = SHADE[w.shade].sc;
      glass += a * SOLAR[w.orient] * g.shgc * sc;   // solar
      glass += a * g.U * dT;                          // conduction
    });
    const walls_ =
      num(walls.sunArea) * WALL[walls.sunType].U * (dT + WALL_SOL_UPLIFT) +
      num(walls.shArea) * WALL[walls.shType].U * dT +
      num(walls.intArea) * PARTITION_U * (0.5 * dT);
    const roof_ = num(roof.area) * ROOF[roof.type].U * (dT + ROOF_SOL_UPLIFT);
    const floor_ = num(floor.area) * FLOOR[floor.type].U * (FLOOR[floor.type].f * dT);
    const pSens = num(people.count) * PEOPLE[people.type].s;
    const pLat = num(people.count) * PEOPLE[people.type].l;
    const equip_ = num(lights) + num(equip);

    // outside air
    const gi = wFromRH(tIn, num(inRH) || 50);
    const go = wFromDBWB(sDB, sWB);
    const ventS = 1.23 * num(oa) * dT;
    const ventL = 3.0 * num(oa) * Math.max(0, go - gi);

    const parts = { glass, walls: walls_, roof: roof_, floor: floor_, people: pSens, equip: equip_, vent: ventS };
    const sensible = Object.values(parts).reduce((a, b) => a + b, 0);
    const latent = pLat + ventL;
    const total = sensible + latent;
    const required = total * SAFETY;
    const unit = UNITS.find((u) => u >= required / 1000) || null;
    const shr = total > 0 ? sensible / total : 0;

    // winter heating (sensible, no gains, no solar)
    const tW = num(inWinter) || 21;
    const dTw = Math.max(0, tW - wDB);
    let heat = 0;
    windows.forEach((w) => { heat += num(w.area) * GLAZING[w.glaze].U * dTw; });
    heat += (num(walls.sunArea) * WALL[walls.sunType].U + num(walls.shArea) * WALL[walls.shType].U + num(walls.intArea) * PARTITION_U * 0.5) * dTw;
    heat += num(roof.area) * ROOF[roof.type].U * dTw;
    heat += num(floor.area) * FLOOR[floor.type].U * FLOOR[floor.type].f * dTw;
    heat += 1.23 * num(oa) * dTw;
    const heatReq = heat * SAFETY;

    return { dT, parts, sensible, latent, pLat, ventL, total, required, unit, shr, go, gi, heat, heatReq, dTw };
  }, [cond, inDB, inRH, inWinter, windows, walls, roof, floor, people, lights, equip, oa]);

  const duct = useMemo(() => computeDuct(outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch),
    [outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch]);
  const suggestedFlow = r.sensible > 0 ? r.sensible / (1.213 * (parseFloat(supDT) || 10)) : 0;

  const addWin = () => setWindows((w) => [...w, { id: WID++, orient: "N", glaze: "sc", shade: "int", area: "" }]);
  const updWin = (id, k, v) => setWindows((w) => w.map((x) => (x.id === id ? { ...x, [k]: v } : x)));
  const delWin = (id) => setWindows((w) => (w.length > 1 ? w.filter((x) => x.id !== id) : w));

  const reset = () => {
    setJob(""); pickLoc(0); setInDB("24"); setInRH("50"); setInWinter("21");
    setWindows([{ id: WID++, orient: "W", glaze: "sc", shade: "int", area: "" }]);
    setWalls({ sunType: "bvi", sunArea: "", shType: "bvi", shArea: "", intArea: "" });
    setRoof({ type: "r35", area: "" }); setFloor({ type: "slab", area: "" });
    setPeople({ count: "", type: "office" }); setLights(""); setEquip(""); setOa("");
  };

  const hasData = r.total > 0;

  const gatherJob = () => ({ v: 2, job, loc, cond, inDB, inRH, inWinter, windows, walls, roof, floor, people, lights, equip, oa, outlets, nr, mat, method, paRate, vMain, vBranch, supDT, runLen, rectH, ceil });
  const applyJob = (d) => {
    if (!d) return;
    setJob(d.job || ""); setLoc(d.loc || 0); setCond(d.cond || cond);
    setInDB(d.inDB != null ? d.inDB : "24"); setInRH(d.inRH != null ? d.inRH : "50"); setInWinter(d.inWinter != null ? d.inWinter : "21");
    setWindows((d.windows || []).map((w) => ({ ...w, id: WID++ })));
    setWalls(d.walls || walls); setRoof(d.roof || roof); setFloor(d.floor || floor);
    setPeople(d.people || people); setLights(d.lights != null ? d.lights : ""); setEquip(d.equip != null ? d.equip : ""); setOa(d.oa != null ? d.oa : "");
    setOutlets((d.outlets || []).map((o) => ({ ...o, id: OID++ })));
    setNr(d.nr || "35"); setMat(d.mat || "galv"); setMethod(d.method || "ef"); setPaRate(d.paRate || "1"); setVMain(d.vMain || ""); setVBranch(d.vBranch || "");
    setSupDT(d.supDT || "10"); setRunLen(d.runLen || "20"); setRectH(d.rectH || "200");
    setCeil(d.ceil != null ? d.ceil : "");
  };
  const saveJob = () => {
    const name = ((job || "").trim()) || window.prompt("Name this job:", "") || "";
    if (!name) return;
    const next = { ...jobs, [name.trim()]: gatherJob() };
    if (persistJobs(next)) { setJobs(next); setSelJob(name.trim()); if (!job) setJob(name.trim()); }
    else setStoreOk(false);
  };
  const openJob = (name) => { setSelJob(name); if (name && jobs[name]) applyJob(jobs[name]); };
  const deleteJob = () => {
    if (!selJob || !jobs[selJob]) return;
    if (!window.confirm("Delete saved job \"" + selJob + "\"?")) return;
    const next = { ...jobs }; delete next[selJob];
    if (persistJobs(next)) { setJobs(next); setSelJob(""); }
  };
  const savePDF = () => window.print();

  return (
    <div className="hl-root">
      <style>{css}</style>

      <header className="hl-head">
        <div className="hl-brand">
          <img className="hl-logo" src={LOGO} alt="Cold Bear Heating & Cooling" />
          <p className="hl-sub">Heat Load Estimator — DA09 design conditions · sensible + latent</p>
        </div>
        <div className="hl-headright">
          <div className="hl-claw" aria-hidden="true"><span></span><span></span><span></span></div>
          <button className="hl-reset" onClick={reset}>Reset</button>
        </div>
      </header>
      <div className="hl-goldrule" aria-hidden="true"></div>

      <div className="hl-toolbar">
        <button className="hl-tbtn" onClick={saveJob}>Save job</button>
        <select className="hl-tsel" value={selJob} onChange={(e) => openJob(e.target.value)}>
          <option value="">Open saved job…</option>
          {Object.keys(jobs).sort().map((nm) => <option key={nm} value={nm}>{nm}</option>)}
        </select>
        <button className="hl-tbtn ghost" onClick={deleteJob} disabled={!selJob}>Delete</button>
        <button className="hl-tbtn gold" onClick={savePDF}>Save PDF quote</button>
        {!storeOk && <span className="hl-thint">Saving isn’t available in this browser</span>}
      </div>

      <div className="hl-tabs">
        <button className={"hl-tab" + (tab === "load" ? " on" : "")} onClick={() => setTab("load")}>Heat load</button>
        <button className={"hl-tab" + (tab === "design" ? " on" : "")} onClick={() => setTab("design")}>Design</button>
        <button className={"hl-tab" + (tab === "fan" ? " on" : "")} onClick={() => setTab("fan")}>Fan</button>
      </div>

      {tab === "load" && (<>
      <DrawingRef />
      <div className="hl-subtabs">
        <button className={"hl-subtab" + (loadView === "block" ? " on" : "")} onClick={() => setLoadView("block")}>Whole building</button>
        <button className={"hl-subtab" + (loadView === "rooms" ? " on" : "")} onClick={() => setLoadView("rooms")}>Per room</button>
      </div>
      {loadView === "rooms" && <RoomLoads cond={cond} inDB={inDB} inRH={inRH} inWinter={inWinter} supDT={supDT} setSupDT={setSupDT} setOutlets={setOutlets} />}
      {loadView === "block" && (<>
      <div className="hl-jobrow">
        <input className="hl-jobinput" value={job} onChange={(e) => setJob(e.target.value)}
          placeholder="Job / room reference — e.g. Narre Warren, Office 1" />
      </div>

      <div className="hl-grid">
        <div className="hl-inputs">

          {/* Design conditions */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Location &amp; design conditions</h2>
              <span className="hl-hint">DA09 / Technical Handbook</span></div>
            <div className="hl-field">
              <label className="hl-lbl">Location</label>
              <select className="hl-sel wide" value={loc} onChange={(e) => pickLoc(parseInt(e.target.value))}>
                {LOCATIONS.map((l, i) => <option key={i} value={i}>{l.n}</option>)}
              </select>
            </div>
            <div className="hl-condgrid">
              <CondField label="Summer DB" suffix="°C" value={cond.sDB} onChange={(v) => setCond((c) => ({ ...c, sDB: v }))} />
              <CondField label="Summer WB" suffix="°C" value={cond.sWB} onChange={(v) => setCond((c) => ({ ...c, sWB: v }))} />
              <CondField label="Winter DB" suffix="°C" value={cond.wDB} onChange={(v) => setCond((c) => ({ ...c, wDB: v }))} />
              <CondField label="Indoor DB" suffix="°C" value={inDB} onChange={setInDB} />
              <CondField label="Indoor RH" suffix="%" value={inRH} onChange={setInRH} />
              <CondField label="Winter set" suffix="°C" value={inWinter} onChange={setInWinter} />
            </div>
            <div className="hl-dtline">Cooling ΔT <b className="mono cold">{r.dT.toFixed(1)} K</b>
              <span className="hl-sep">·</span> Heating ΔT <b className="mono red">{r.dTw.toFixed(1)} K</b></div>
          </section>

          {/* Glass */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Glass &amp; windows</h2>
              <span className="hl-hint">orientation drives solar</span></div>
            <div className="hl-winwrap">
              {windows.map((w, i) => (
                <div className="hl-winrow" key={w.id}>
                  <span className="hl-winnum">{i + 1}</span>
                  <div className="hl-winfield">
                    <label className="hl-flbl">Facing</label>
                    <select className="hl-sel" value={w.orient} onChange={(e) => updWin(w.id, "orient", e.target.value)}>
                      {ORIENTS.map((o) => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                  <div className="hl-winfield">
                    <label className="hl-flbl">Glazing</label>
                    <select className="hl-sel" value={w.glaze} onChange={(e) => updWin(w.id, "glaze", e.target.value)}>
                      {Object.entries(GLAZING).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="hl-winfield">
                    <label className="hl-flbl">Shading</label>
                    <select className="hl-sel" value={w.shade} onChange={(e) => updWin(w.id, "shade", e.target.value)}>
                      {Object.entries(SHADE).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="hl-winfield area">
                    <label className="hl-flbl">Glass area</label>
                    <div className="hl-unitfield">
                      <input className="hl-num" type="number" min="0" inputMode="decimal" value={w.area}
                        onChange={(e) => updWin(w.id, "area", e.target.value)} placeholder="0" />
                      <span className="hl-suffix">m²</span>
                    </div>
                  </div>
                  <button className="hl-del win" onClick={() => delWin(w.id)} aria-label="Remove window">×</button>
                </div>
              ))}
            </div>
            <button className="hl-add" onClick={addWin}>+ Add window</button>
          </section>

          {/* Walls */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Walls</h2></div>
            <ConstructRow label="External — sunlit" typeOpts={WALL} type={walls.sunType} area={walls.sunArea}
              onType={(v) => setWalls((s) => ({ ...s, sunType: v }))} onArea={(v) => setWalls((s) => ({ ...s, sunArea: v }))} u={WALL[walls.sunType].U} />
            <ConstructRow label="External — shaded" typeOpts={WALL} type={walls.shType} area={walls.shArea}
              onType={(v) => setWalls((s) => ({ ...s, shType: v }))} onArea={(v) => setWalls((s) => ({ ...s, shArea: v }))} u={WALL[walls.shType].U} />
            <div className="hl-field">
              <label className="hl-lbl">Internal partitions</label>
              <div className="hl-fieldright">
                <div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal"
                  value={walls.intArea} onChange={(e) => setWalls((s) => ({ ...s, intArea: e.target.value }))} placeholder="0" />
                  <span className="hl-suffix">m²</span></div>
                <span className="hl-note">U 2.0 · ½ΔT</span>
              </div>
            </div>
          </section>

          {/* Roof & floor */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Roof &amp; floor</h2></div>
            <ConstructRow label="Roof / ceiling" typeOpts={ROOF} type={roof.type} area={roof.area}
              onType={(v) => setRoof((s) => ({ ...s, type: v }))} onArea={(v) => setRoof((s) => ({ ...s, area: v }))} u={ROOF[roof.type].U} />
            <ConstructRow label="Floor" typeOpts={FLOOR} type={floor.type} area={floor.area}
              onType={(v) => setFloor((s) => ({ ...s, type: v }))} onArea={(v) => setFloor((s) => ({ ...s, area: v }))} u={FLOOR[floor.type].U} />
          </section>

          {/* Internal gains */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Internal gains</h2><span className="hl-hint">split sensible / latent</span></div>
            <div className="hl-field">
              <label className="hl-lbl">People</label>
              <div className="hl-fieldright">
                <select className="hl-sel" value={people.type} onChange={(e) => setPeople((s) => ({ ...s, type: e.target.value }))}>
                  {Object.entries(PEOPLE).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
                <div className="hl-unitfield sm"><input className="hl-num sm" type="number" min="0" inputMode="numeric"
                  value={people.count} onChange={(e) => setPeople((s) => ({ ...s, count: e.target.value }))} placeholder="0" />
                  <span className="hl-suffix">ppl</span></div>
              </div>
            </div>
            <Field label="Lights" suffix="W" value={lights} onChange={setLights} note="all sensible" />
            <Field label="Equipment" suffix="W" value={equip} onChange={setEquip} note="all sensible" />
          </section>

          {/* Ventilation */}
          <section className="hl-card">
            <div className="hl-cardhead"><h2>Outside air</h2><span className="hl-hint">drives latent load</span></div>
            <Field label="Ventilation / infiltration" suffix="L/s" value={oa} onChange={setOa} note="≈10 L/s per person" />
            {hasData && num(oa) > 0 && (
              <div className="hl-dtline small">Outdoor {r.go.toFixed(1)} g/kg · indoor {r.gi.toFixed(1)} g/kg moisture</div>
            )}
          </section>
        </div>

        {/* RESULTS */}
        <div className="hl-results">
          <div className="hl-resultcard">
            <div className="hl-eyebrow">Recommended cooling capacity</div>
            {hasData ? (
              <>
                <div className="hl-big">{r.unit ? r.unit.toFixed(1) : "—"}<span className="hl-bigunit">kW</span></div>
                <div className="hl-reqline">
                  {r.unit ? <>Fit a <b>{r.unit.toFixed(1)} kW</b> unit — required {fmtKW(r.required)} kW total</>
                    : <>Over {UNITS[UNITS.length - 1]} kW — multiple units or ducted</>}
                </div>

                <div className="hl-splitrow">
                  <div className="hl-chip2"><span className="hl-chiplbl">Sensible</span><span className="hl-chipval warm mono">{fmtW(r.sensible)} W</span></div>
                  <div className="hl-chip2"><span className="hl-chiplbl">Latent</span><span className="hl-chipval cold mono">{fmtW(r.latent)} W</span></div>
                  <div className="hl-chip2"><span className="hl-chiplbl">SHR</span><span className="hl-chipval mono">{r.shr.toFixed(2)}</span></div>
                </div>

                <div className="hl-meta">
                  <div className="hl-metarow"><span>Total cooling</span><span className="mono">{fmtW(r.total)} W · {fmtKW(r.total)} kW</span></div>
                  <div className="hl-metarow faint"><span>Safety margin</span><span className="mono">× {SAFETY}</span></div>
                  <div className="hl-metarow strong"><span>Required</span><span className="mono cold">{fmtKW(r.required)} kW</span></div>
                  <div className="hl-metarow heat"><span>Heating (winter)</span><span className="mono red">{fmtKW(r.heatReq)} kW</span></div>
                </div>

                <div className="hl-breakdown">
                  <div className="hl-bklabel">Sensible load by source</div>
                  <div className="hl-bar">
                    {SEG.map((s) => {
                      const v = r.parts[s.key]; const pct = r.sensible ? (v / r.sensible) * 100 : 0;
                      if (pct <= 0) return null;
                      return <div key={s.key} className="hl-barseg" style={{ width: pct + "%", background: s.color }} title={`${s.label}: ${fmtW(v)} W`} />;
                    })}
                  </div>
                  <div className="hl-legend">
                    {SEG.map((s) => {
                      const v = r.parts[s.key]; if (v <= 0) return null;
                      const pct = r.sensible ? Math.round((v / r.sensible) * 100) : 0;
                      return (<div key={s.key} className="hl-leg"><span className="hl-dot" style={{ background: s.color }} />
                        <span className="hl-legname">{s.label}</span><span className="hl-legval mono">{fmtW(v)} W · {pct}%</span></div>);
                    })}
                  </div>
                </div>
              </>
            ) : (
              <div className="hl-empty">Pick a location and enter the room — glass area and orientation first; they usually drive the load.</div>
            )}
          </div>
          <p className="hl-foot">
            Q = U·A·ΔT conduction + glass solar + internal gains + outside-air load. Design
            conditions from AIRAH DA09 (via Technical Handbook §2). Sunlit walls/roof use a
            fixed sol-air uplift; no heat-storage / CLTD time-lag modelling. Sound for quick
            sizing — run a full DA09 calc for design and tender work.
          </p>
        </div>
      </div>
      </>)}
      </>)}

      {tab === "design" && (<>
      <div className="hl-subtabs">
        <button className={"hl-subtab" + (designView === "plan" ? " on" : "")} onClick={() => setDesignView("plan")}>Drawing / layout</button>
        <button className={"hl-subtab" + (designView === "duct" ? " on" : "")} onClick={() => setDesignView("duct")}>Duct sizer</button>
      </div>
      {designView === "plan" && <PlanDesign outlets={outlets} setOutlets={setOutlets} nr={nr} setNr={setNr} mat={mat} setMat={setMat} method={method} setMethod={setMethod} paRate={paRate} setPaRate={setPaRate} vMain={vMain} setVMain={setVMain} vBranch={vBranch} setVBranch={setVBranch} ceil={ceil} setCeil={setCeil} />}
      {designView === "duct" && <DuctDesign sensibleW={r.sensible} outlets={outlets} setOutlets={setOutlets} nr={nr} setNr={setNr} mat={mat} setMat={setMat} method={method} setMethod={setMethod} paRate={paRate} setPaRate={setPaRate} vMain={vMain} setVMain={setVMain} vBranch={vBranch} setVBranch={setVBranch} supDT={supDT} setSupDT={setSupDT} runLen={runLen} setRunLen={setRunLen} rectH={rectH} setRectH={setRectH} />}
      </>)}
      {tab === "fan" && <FanPressure outlets={outlets} nr={nr} setNr={setNr} mat={mat} setMat={setMat} method={method} setMethod={setMethod} paRate={paRate} setPaRate={setPaRate} vMain={vMain} setVMain={setVMain} vBranch={vBranch} setVBranch={setVBranch} rectH={rectH} runLen={runLen} />}

      <QuoteSheet job={job} locName={LOCATIONS[loc] ? LOCATIONS[loc].n : ""} cond={cond} inDB={inDB} inRH={inRH} inWinter={inWinter} ceil={ceil} r={r} duct={duct} suggested={suggestedFlow} supDT={supDT} />
    </div>
  );
}

function DuctDesign({ sensibleW, outlets, setOutlets, nr, setNr, mat, setMat, method, setMethod, paRate, setPaRate, vMain, setVMain, vBranch, setVBranch, supDT, setSupDT, runLen, setRunLen, rectH, setRectH }) {
  const [showRect, setShowRect] = useState(false);

  const dtn = parseFloat(supDT) || 10;
  const suggested = sensibleW > 0 ? sensibleW / (1.213 * dtn) : 0;

  const addOut = () => setOutlets((o) => [...o, { id: OID++, name: "Outlet " + (o.length + 1), flow: "" }]);
  const updOut = (id, k, v) => setOutlets((o) => o.map((x) => (x.id === id ? { ...x, [k]: v } : x)));
  const delOut = (id) => setOutlets((o) => (o.length > 1 ? o.filter((x) => x.id !== id) : o));
  const fillEven = () => {
    const n = outlets.length || 1;
    const per = suggested > 0 ? Math.round(suggested / n) : 0;
    setOutlets((o) => o.map((x) => ({ ...x, flow: per ? String(per) : "" })));
  };

  const du = useMemo(() => computeDuct(outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch),
    [outlets, nr, mat, method, paRate, rectH, runLen, vMain, vBranch]);

  const statusColor = (st) => (st === "over" ? "var(--red)" : st === "warn" ? "var(--gold)" : "var(--teal)");
  const f1 = (x) => (x || x === 0 ? Number(x).toFixed(1) : "—");
  const rowCls = "hl-segrow" + (showRect ? " rect" : "");

  const n = outlets.length, dx = 130, x0 = 84, yT = 64, yD = 150;
  const W = x0 + Math.max(1, n - 1) * dx + 60;

  return (
    <div className="hl-grid">
      <div className="hl-inputs">
        <section className="hl-card">
          <div className="hl-cardhead"><h2>Air &amp; method</h2><span className="hl-hint">from the load, or your own</span></div>
          <div className="hl-field"><label className="hl-lbl">Noise rating (area)</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={nr} onChange={(e) => setNr(e.target.value)}>
              <option value="30">NR30 · bedrooms, quiet studies</option>
              <option value="35">NR35 · living areas, private offices</option>
              <option value="40">NR40 · open offices, retail</option>
              <option value="45">NR45 · shops, busy areas</option>
              <option value="50">NR50 · workshops, noisy areas</option></select></div></div>
          <div className="hl-field"><label className="hl-lbl">Duct material</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={mat} onChange={(e) => setMat(e.target.value)}>
              <option value="galv">Galvanised steel (0.15 mm)</option>
              <option value="alum">Aluminium (0.05 mm)</option>
              <option value="flex">Flexible (~0.9 mm)</option></select></div></div>
          <div className="hl-field"><label className="hl-lbl">Sizing method</label>
            <div className="hl-fieldright"><select className="hl-sel wide" value={method} onChange={(e) => setMethod(e.target.value)}>
              <option value="ef">Equal friction (Pa/m)</option><option value="vel">Velocity (m/s)</option></select></div></div>
          {method === "ef"
            ? <Field label="Friction rate" suffix="Pa/m" value={paRate} onChange={setPaRate} note="≈1 typical" />
            : (<>
                <Field label="Main velocity" suffix="m/s" value={vMain} onChange={setVMain} note={"NR limit " + du.lim.main} />
                <Field label="Branch velocity" suffix="m/s" value={vBranch} onChange={setVBranch} note={"NR limit " + du.lim.branch} />
              </>)}
          <Field label="Supply air ΔT" suffix="K" value={supDT} onChange={setSupDT} note="cooling" />
          <div className="hl-dtline small">From the load: {Math.round(sensibleW)} W ÷ (1.213 × {f1(dtn)} K) ≈ <b className="cold">{Math.round(suggested)} L/s</b> total supply air.</div>
        </section>

        <section className="hl-card">
          <div className="hl-cardhead"><h2>Outlets / rooms</h2><span className="hl-hint">flow each</span></div>
          <div className="hl-winwrap">
            {outlets.map((o, i) => (
              <div className="hl-winrow" key={o.id}>
                <span className="hl-winnum">{i + 1}</span>
                <div className="hl-winfield" style={{ flex: "2 1 150px" }}>
                  <label className="hl-flbl">Room / outlet</label>
                  <input className="hl-jobinput" style={{ padding: "9px 11px", fontSize: "13px" }} value={o.name} onChange={(e) => updOut(o.id, "name", e.target.value)} placeholder={"Outlet " + (i + 1)} />
                </div>
                <div className="hl-winfield area">
                  <label className="hl-flbl">Flow</label>
                  <div className="hl-unitfield"><input className="hl-num" type="number" min="0" inputMode="decimal" value={o.flow} onChange={(e) => updOut(o.id, "flow", e.target.value)} placeholder="0" /><span className="hl-suffix">L/s</span></div>
                </div>
                <button className="hl-del win" onClick={() => delOut(o.id)} aria-label="Remove outlet">×</button>
              </div>
            ))}
          </div>
          <div className="hl-ductbtns">
            <button className="hl-add" onClick={addOut}>+ Add outlet</button>
            <button className="hl-add" onClick={fillEven} disabled={suggested <= 0}>Fill evenly from load</button>
          </div>
        </section>

        <section className="hl-card">
          <div className="hl-cardhead"><h2>Run &amp; shape</h2></div>
          <Field label="Longest run length" suffix="m" value={runLen} onChange={setRunLen} note="index run" />
          <div className="hl-field"><label className="hl-lbl">Rectangular sizes</label>
            <div className="hl-fieldright"><button className={"hl-toggle" + (showRect ? " on" : "")} onClick={() => setShowRect((x) => !x)}>{showRect ? "On" : "Off"}</button></div></div>
          {showRect && <Field label="Duct height" suffix="mm" value={rectH} onChange={setRectH} note="fixed" />}
        </section>
      </div>

      <div className="hl-results">
        <div className="hl-resultcard">
          <div className="hl-eyebrow">Duct schedule</div>
          {du.total > 0 ? (<>
            <div className="hl-big" style={{ fontSize: "44px" }}>{Math.round(du.total)}<span className="hl-bigunit">L/s</span></div>
            <div className="hl-reqline">{du.lim.label} · {method === "ef" ? (paRate || 1) + " Pa/m equal-friction" : "velocity " + (parseFloat(vMain) || du.lim.main) + "/" + (parseFloat(vBranch) || du.lim.branch) + " m/s"} · {MAT_LABEL[mat]} round</div>

            <div className="hl-schemwrap"><svg className="hl-schem" viewBox={`0 0 ${W} 200`} preserveAspectRatio="xMidYMid meet">
              <rect x="8" y={yT - 16} width="56" height="32" rx="6" fill="#0f1d31" stroke="var(--teal-deep)" />
              <text x="36" y={yT + 5} textAnchor="middle" fontSize="11" fill="var(--teal)">UNIT</text>
              {outlets.map((o, i) => {
                const xPrev = i === 0 ? 64 : x0 + (i - 1) * dx;
                const x = x0 + i * dx;
                const t = du.segs[i] && du.segs[i].s;
                const br = du.branches[i] && du.branches[i].s;
                return (
                  <g key={o.id}>
                    <line x1={xPrev} y1={yT} x2={x} y2={yT} stroke="var(--teal)" strokeWidth="8" strokeLinecap="round" />
                    {t && <text x={(xPrev + x) / 2} y={yT - 12} textAnchor="middle" fontSize="11" fill="var(--muted)">Ø{t.dia}</text>}
                    <line x1={x} y1={yT} x2={x} y2={yD} stroke="var(--gold)" strokeWidth="6" strokeLinecap="round" />
                    <rect x={x - 30} y={yD} width="60" height="26" rx="5" fill="#0f1d31" stroke="var(--gold-deep)" />
                    <text x={x} y={yD + 17} textAnchor="middle" fontSize="11" fill="var(--gold)">{br ? "Ø" + br.dia : "—"}</text>
                    <text x={x} y={yD + 41} textAnchor="middle" fontSize="10" fill="var(--muted)">{(o.name || ("Out " + (i + 1))).slice(0, 10)}</text>
                    <text x={x} y={yD + 55} textAnchor="middle" fontSize="9.5" fill="var(--faint)">{Math.round(du.branches[i].Q)} L/s</text>
                  </g>
                );
              })}
            </svg></div>

            <div className="hl-segtable">
              <div className={rowCls + " hl-seghead"}><span>Segment</span><span>L/s</span><span>Ø</span><span>m/s</span><span>Pa/m</span>{showRect && <span>Rect</span>}</div>
              {du.segs.map((sg, i) => (
                <div className={rowCls} key={"t" + i}><span className="hl-segname">{sg.label}</span>
                  <span className="mono">{Math.round(sg.Q)}</span><span className="mono">{sg.s ? sg.s.dia : "—"}</span>
                  <span className="mono" style={{ color: sg.s ? statusColor(sg.s.status) : "var(--faint)" }}>{sg.s ? f1(sg.s.v) : "—"}</span>
                  <span className="mono">{sg.s ? f1(sg.s.pa) : "—"}</span>
                  {showRect && <span className="mono">{sg.s ? sg.s.rectW + "×" + sg.s.b : "—"}</span>}
                </div>
              ))}
              {du.branches.map((sg, i) => (
                <div className={rowCls} key={"b" + i}><span className="hl-segname">↳ {sg.label}</span>
                  <span className="mono">{Math.round(sg.Q)}</span><span className="mono">{sg.s ? sg.s.dia : "—"}</span>
                  <span className="mono" style={{ color: sg.s ? statusColor(sg.s.status) : "var(--faint)" }}>{sg.s ? f1(sg.s.v) : "—"}</span>
                  <span className="mono">{sg.s ? f1(sg.s.pa) : "—"}</span>
                  {showRect && <span className="mono">{sg.s ? sg.s.rectW + "×" + sg.s.b : "—"}</span>}
                </div>
              ))}
            </div>

            <div className="hl-meta">
              <div className="hl-metarow"><span>Total supply air</span><span className="mono">{Math.round(du.total)} L/s</span></div>
              <div className="hl-metarow faint"><span>Velocity limit</span><span className="mono">main {du.lim.main} · branch {du.lim.branch} m/s</span></div>
              <div className="hl-metarow faint"><span>Straight-duct friction</span><span className="mono">{Math.round(du.straight)} Pa</span></div>
              <div className="hl-metarow faint"><span>Terminal allowance</span><span className="mono">{du.terminal} Pa</span></div>
              <div className="hl-metarow strong"><span>Index-run total ≈</span><span className="mono cold">{Math.round(du.indexPa)} Pa</span></div>
            </div>
            <div className="hl-legend" style={{ marginTop: "12px" }}>
              <div className="hl-leg"><span className="hl-dot" style={{ background: "var(--teal)" }} /><span className="hl-legname">OK velocity</span></div>
              <div className="hl-leg"><span className="hl-dot" style={{ background: "var(--gold)" }} /><span className="hl-legname">Near limit — check noise</span></div>
              <div className="hl-leg"><span className="hl-dot" style={{ background: "var(--red)" }} /><span className="hl-legname">Over limit — size up</span></div>
            </div>
          </>) : (
            <div className="hl-empty">Enter a flow for each outlet, or tap “Fill evenly from load” to split the {Math.round(suggested) || "—"} L/s from your heat-load result across the rooms.</div>
          )}
        </div>
        <p className="hl-foot">
          Method &amp; data: AIRAH DA3 <i>Ductwork for Air Conditioning</i>. Equal-friction (constant pressure
          gradient) sizing, ~1 Pa/m typical; round duct via the Colebrook–White friction relation with absolute
          roughness ks from DA3 Table 3-40A (galvanised 0.15 mm, aluminium 0.05 mm; flexible ~0.9 mm assumed).
          Velocity V = 1273·(L/s)/Ø²; velocity limits are DA3 Table 5-100A recommended maximums by NR of the served
          space. Reducing main — each main segment carries its downstream outlets. Rectangular equivalent
          De = 1.30·(a·b)^0.625/(a+b)^0.25. Index-run ≈ straight-duct friction + a 25 Pa terminal allowance
          (per the DA3 example); add fitting losses and fan system effect for final fan selection.
        </p>
      </div>
    </div>
  );
}

function PlanDesign({ outlets, setOutlets, nr, setNr, mat, setMat, method, setMethod, paRate, setPaRate, vMain, setVMain, vBranch, setVBranch, ceil, setCeil }) {
  const [boot] = useState(() => loadPlan());
  const [img, setImg] = useState(() => (PLAN_IMG ? PLAN_IMG.url : null));
  const [iw, setIw] = useState((PLAN_IMG && PLAN_IMG.iw) || boot.iw || 1000);
  const [ih, setIh] = useState((PLAN_IMG && PLAN_IMG.ih) || boot.ih || 680);
  const [zoom, setZoom] = useState(1);
  const [maxed, setMaxed] = useState(false);
  const [scale, setScale] = useState(boot.scale || 0);
  const [scaleLen, setScaleLen] = useState(boot.scaleLen || "4");
  const [mode, setMode] = useState("unit");
  const [nodes, setNodes] = useState(boot.nodes || []);
  const [edges, setEdges] = useState(boot.edges || []);
  const [connectFrom, setConnectFrom] = useState(null);
  const [scalePts, setScalePts] = useState([]);
  const [target, setTarget] = useState(null);
  const [drag, setDrag] = useState(null);
  const [rotDrag, setRotDrag] = useState(null);
  const [pdfDoc, setPdfDoc] = useState(null);
  const [pdfPages, setPdfPages] = useState(0);
  const [pdfPage, setPdfPage] = useState(1);
  const [pdfErr, setPdfErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [detected, setDetected] = useState(null);
  const [raFaceV, setRaFaceV] = useState(boot.raFaceV || "");
  const [raFree, setRaFree] = useState(boot.raFree || "0.75");
  const [raType, setRaType] = useState(boot.raType || "egg");
  const [raLpm, setRaLpm] = useState(boot.raLpm || "25");
  const [placeType, setPlaceType] = useState("");
  const [placeSize, setPlaceSize] = useState("");
  const [placeCustom, setPlaceCustom] = useState("");
  const [renderScl, setRenderScl] = useState(0);
  const [plotScale, setPlotScale] = useState("100");

  const f1 = (x) => (x || x === 0 ? Number(x).toFixed(1) : "—");
  const numOf = (v) => Math.max(0, parseFloat(v) || 0);
  const nid = () => "n" + Math.random().toString(36).slice(2, 8);
  const eid = () => "e" + Math.random().toString(36).slice(2, 8);
  const nodeById = (id) => nodes.find((n) => n.id === id);
  const stCol = (st) => (st === "over" ? "var(--red)" : st === "warn" ? "var(--gold)" : "var(--teal)");
  const updNode = (id, k, v) => setNodes((ns) => ns.map((n) => (n.id === id ? { ...n, [k]: v } : n)));

  const ensurePdf = () => {
    if (!window.pdfjsLib) return false;
    if (!window.__cbPdfWorker) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      window.__cbPdfWorker = true;
    }
    return true;
  };

  const scanPdfText = async (doc) => {
    const re = /(ceiling(?:\s*height)?|\bc\.?h\.?\b|\bf\.?c\.?l\.?\b|soffit|affl)[^0-9]{0,14}(\d{1,2}\.\d{1,3}|\d{3,4})/gi;
    const found = []; let hasText = false;
    const maxScan = Math.min(doc.numPages, 40);
    for (let p = 1; p <= maxScan; p++) {
      try {
        const page = await doc.getPage(p);
        const tc = await page.getTextContent();
        const text = tc.items.map((it) => it.str).join(" ").replace(/\s+/g, " ");
        if (text.trim()) hasText = true;
        let m; re.lastIndex = 0;
        while ((m = re.exec(text)) !== null) {
          const raw = m[2], val = parseFloat(raw);
          const mm = Math.round(raw.indexOf(".") >= 0 || val <= 6 ? val * 1000 : val);
          if (mm < 1800 || mm > 6000) continue;
          if (!found.some((f) => f.mm === mm)) found.push({ mm, page: p });
        }
      } catch (e) { /* skip unreadable page */ }
    }
    setDetected({ hasText, ceil: found.slice(0, 8) });
  };

  const renderPdfPage = async (doc, pageNo) => {
    setBusy(true); setPdfErr("");
    try {
      const page = await doc.getPage(pageNo);
      const base = page.getViewport({ scale: 1 });
      const scl = Math.min(2.5, Math.max(1, 1600 / base.width));
      setRenderScl(scl);
      const vp = page.getViewport({ scale: scl });
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(vp.width); canvas.height = Math.round(vp.height);
      await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
      setPdfPage(pageNo); setScale(0); setScalePts([]);
      const url = canvas.toDataURL("image/png");
      PLAN_IMG = { url, iw: canvas.width, ih: canvas.height };
      setIw(canvas.width); setIh(canvas.height); setImg(url);
    } catch (e) { setPdfErr("Couldn’t render that PDF page."); }
    setBusy(false);
  };

  const loadPdf = async (buf) => {
    setPdfErr("");
    if (!ensurePdf()) { setPdfErr("PDF engine didn’t load — check your connection, then re-import."); return; }
    setBusy(true);
    try {
      const doc = await window.pdfjsLib.getDocument({ data: buf }).promise;
      setPdfDoc(doc); setPdfPages(doc.numPages);
      await renderPdfPage(doc, 1);
      await scanPdfText(doc);
    } catch (e) { setPdfErr("Couldn’t read that PDF."); setBusy(false); }
  };

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
    const rd = new FileReader();
    if (isPdf) {
      rd.onload = () => loadPdf(rd.result);
      rd.readAsArrayBuffer(file);
    } else {
      setPdfDoc(null); setPdfPages(0); setPdfErr(""); setDetected(null);
      rd.onload = () => {
        const url = rd.result;
        const im = new Image();
        im.onload = () => { const w = im.naturalWidth || 1000, h = im.naturalHeight || 680; PLAN_IMG = { url, iw: w, ih: h }; setIw(w); setIh(h); setImg(url); setScale(0); setScalePts([]); };
        im.src = url;
      };
      rd.readAsDataURL(file);
    }
    e.target.value = "";
  };

  const toSvg = (svg, cx, cy) => {
    const pt = svg.createSVGPoint(); pt.x = cx; pt.y = cy;
    const m = svg.getScreenCTM(); if (!m) return { x: 0, y: 0 };
    const p = pt.matrixTransform(m.inverse());
    return { x: p.x, y: p.y };
  };

  const addNode = (type, x, y) => {
    const eSize = placeSize === "custom" ? String(placeCustom || "").trim().toLowerCase().replace(/\s/g, "").replace(/[x×*]/g, "x") : placeSize;
    if (type === "unit") {
      setNodes((ns) => [...ns.filter((n) => n.type !== "unit"), { id: nid(), type, x, y, name: "Unit" }]);
    } else if (type === "diffuser") {
      const k = nodes.filter((n) => n.type === "diffuser").length + 1;
      setNodes((ns) => [...ns, { id: nid(), type, x, y, name: "Diff " + k, flow: "", gtype: placeType, gsize: eSize }]);
    } else if (type === "return") {
      const k = nodes.filter((n) => n.type === "return").length + 1;
      setNodes((ns) => [...ns, { id: nid(), type, x, y, name: "Return " + k, flow: "", gtype: placeType, gsize: eSize }]);
    } else {
      setNodes((ns) => [...ns, { id: nid(), type, x, y }]);
    }
  };

  const fillReturns = () => {
    const rets = nodes.filter((n) => n.type === "return");
    if (!rets.length) return;
    const supply = nodes.filter((n) => n.type === "diffuser").reduce((s, n) => s + numOf(n.flow), 0);
    if (supply <= 0) return;
    const per = Math.round(supply / rets.length);
    setNodes((ns) => ns.map((n) => (n.type === "return" ? { ...n, flow: String(per) } : n)));
  };

  const seed = () => {
    const named = outlets.filter((o) => (o.name || "").trim() || numOf(o.flow) > 0);
    const ds = named.map((o, i) => ({ id: nid(), type: "diffuser", x: 50, y: 50 + i * 48, name: o.name || ("Outlet " + (i + 1)), flow: o.flow || "" }));
    const keep = nodes.filter((n) => n.type !== "diffuser");
    const keepIds = keep.map((n) => n.id);
    setNodes([...keep, ...ds]);
    setEdges((es) => es.filter((e) => keepIds.includes(e.a) && keepIds.includes(e.b)));
    setTarget(null); setConnectFrom(null);
  };

  const onCanvasClick = (e) => {
    const { x, y } = toSvg(e.currentTarget, e.clientX, e.clientY);
    if (mode === "scale" || mode === "measure" || mode === "area") setScalePts((p) => (p.length >= 2 ? [{ x, y }] : [...p, { x, y }]));
    else if (mode === "unit" || mode === "diffuser" || mode === "return" || mode === "junction") addNode(mode, x, y);
    else if (mode === "connect") setConnectFrom(null);
    else if (mode === "select") setTarget(null);
  };

  const applyScale = () => {
    if (scalePts.length < 2) return;
    const px = Math.hypot(scalePts[1].x - scalePts[0].x, scalePts[1].y - scalePts[0].y);
    const L = parseFloat(scaleLen) || 0;
    if (px > 0 && L > 0) { setScale(px / L); setMode("unit"); }
  };

  // Set scale directly from a PDF's plotted scale (e.g. 1:100), using the rendered sheet geometry.
  const applyPlotScale = (val) => {
    const D = parseFloat(val != null ? val : plotScale) || 0;
    if (!(renderScl > 0) || !(D > 0)) return;
    setScale((1000 * renderScl * 72) / (25.4 * D));
  };

  const onNodeClick = (id) => (e) => {
    e.stopPropagation();
    if (mode === "delete") {
      setNodes((ns) => ns.filter((n) => n.id !== id));
      setEdges((es) => es.filter((ed) => ed.a !== id && ed.b !== id));
      if (target === id) setTarget(null);
      return;
    }
    if (mode === "connect") {
      if (connectFrom == null) setConnectFrom(id);
      else if (connectFrom !== id) {
        const a = connectFrom, b = id;
        setEdges((es) => (es.some((ed) => (ed.a === a && ed.b === b) || (ed.a === b && ed.b === a)) ? es : [...es, { id: eid(), a, b }]));
        setConnectFrom(id);
      }
      return;
    }
    setTarget(id);
  };
  const onNodeDown = (id) => (e) => { if (mode !== "select") return; e.stopPropagation(); setDrag(id); setTarget(id); };
  const onRotDown = (id) => (e) => { e.stopPropagation(); setRotDrag(id); setTarget(id); };
  const onMove = (e) => {
    if (rotDrag != null) {
      const { x, y } = toSvg(e.currentTarget, e.clientX, e.clientY);
      const n = nodes.find((z) => z.id === rotDrag); if (!n) return;
      let deg = Math.round(Math.atan2(y - n.y, x - n.x) * 180 / Math.PI + 90);
      const near = Math.round(deg / 15) * 15; if (Math.abs(deg - near) <= 4) deg = near;
      deg = ((deg % 360) + 360) % 360;
      setNodes((ns) => ns.map((z) => (z.id === rotDrag ? { ...z, rot: deg } : z)));
      return;
    }
    if (drag == null) return; const { x, y } = toSvg(e.currentTarget, e.clientX, e.clientY); setNodes((ns) => ns.map((n) => (n.id === drag ? { ...n, x, y } : n)));
  };
  const onUp = () => { setDrag(null); setRotDrag(null); };
  const onEdgeClick = (id) => (e) => { if (mode !== "delete") return; e.stopPropagation(); setEdges((es) => es.filter((ed) => ed.id !== id)); };

  const plan = useMemo(() => {
    const unit = nodes.find((n) => n.type === "unit");
    const nodeMap = {}; nodes.forEach((n) => (nodeMap[n.id] = n));
    const adj = {}; nodes.forEach((n) => (adj[n.id] = []));
    edges.forEach((e) => { if (adj[e.a] && adj[e.b]) { adj[e.a].push({ e, o: e.b }); adj[e.b].push({ e, o: e.a }); } });
    const diffs = nodes.filter((n) => n.type === "diffuser");
    const rets = nodes.filter((n) => n.type === "return");
    const leaves = [...diffs, ...rets];
    const totalFlow = diffs.reduce((s, n) => s + numOf(n.flow), 0);
    const returnFlow = rets.reduce((s, n) => s + numOf(n.flow), 0);
    const raV = parseFloat(raFaceV) || RA_FACE[nr] || 2.0;
    const lpm = parseFloat(raLpm) || 25;
    const returns = rets.map((n) => ({ id: n.id, name: n.name, flow: numOf(n.flow), grille: deviceInfo(numOf(n.flow), n.gtype || raType, n.gsize, raV, lpm) }));
    if (!unit) return { unit: null, segs: [], totalFlow, returnFlow, returns, raV, index: null, cycle: false, orphans: leaves.map((n) => n.id) };
    const parent = {}, depth = {}, order = [], seen = {};
    seen[unit.id] = true; depth[unit.id] = 0; parent[unit.id] = null;
    const q = [unit.id]; let cycle = false;
    while (q.length) {
      const u = q.shift(); order.push(u);
      adj[u].forEach(({ o }) => {
        if (!seen[o]) { seen[o] = true; parent[o] = u; depth[o] = depth[u] + 1; q.push(o); }
        else if (parent[u] !== o) cycle = true;
      });
    }
    const sub = {}; nodes.forEach((n) => (sub[n.id] = (n.type === "diffuser" || n.type === "return") ? numOf(n.flow) : 0));
    for (let i = order.length - 1; i >= 0; i--) { const u = order[i]; if (parent[u] != null) sub[parent[u]] += sub[u]; }
    const cntD = {}, cntR = {};
    nodes.forEach((n) => { cntD[n.id] = n.type === "diffuser" ? 1 : 0; cntR[n.id] = n.type === "return" ? 1 : 0; });
    for (let i = order.length - 1; i >= 0; i--) { const u = order[i]; if (parent[u] != null) { cntD[parent[u]] += cntD[u]; cntR[parent[u]] += cntR[u]; } }
    const ks = KS[mat], tgt = parseFloat(paRate) || 1, lim = NR_LIMITS[nr];
    const tvMain = parseFloat(vMain) || lim.main, tvBranch = parseFloat(vBranch) || lim.branch;
    const sizeEdge = (carried, role, side) => {
      if (carried <= 0) return { dia: 0, v: 0, pa: 0, status: "ok" };
      const vmax = side === "return" ? lim.ret : (role === "main" ? lim.main : lim.branch);
      const vtar = side === "return" ? lim.ret : (role === "main" ? tvMain : tvBranch);
      const dia = method === "ef" ? diaForFriction(carried, tgt, ks) : diaForVel(carried, vtar);
      const std = nextStd(dia), v = velRound(carried, std), pa = frictionPaPerM(carried, std, ks);
      return { dia: std, v, pa, status: v > vmax ? "over" : v > vmax * 0.85 ? "warn" : "ok" };
    };
    const lbl = (n) => (n ? (n.name || (n.type === "unit" ? "Unit" : "junction")) : "?");
    const segs = []; const segByChild = {};
    edges.forEach((e) => {
      let child = e.b, par = e.a;
      if (depth[e.a] != null && depth[e.b] != null) { if (depth[e.a] > depth[e.b]) { child = e.a; par = e.b; } }
      else if (depth[e.a] == null) { child = e.a; par = e.b; }
      const cn = nodeMap[child], pn = nodeMap[par];
      const carried = sub[child] || 0;
      const role = cn && (cn.type === "diffuser" || cn.type === "return") ? "branch" : "main";
      const side = (cntR[child] > 0 && cntD[child] === 0) ? "return" : "supply";
      const px = cn && pn ? Math.hypot(cn.x - pn.x, cn.y - pn.y) : 0;
      const Lm = scale > 0 ? px / scale : null;
      const seg = { id: e.id, child, par, carried, role, side, Lm, from: lbl(pn), to: lbl(cn), ...sizeEdge(carried, role, side) };
      segs.push(seg); segByChild[child] = seg;
    });
    let index = null, supBest = null, retBest = null;
    const segToRow = (sg) => ({ name: (sg.from || "?") + " → " + (sg.to || "?"), Q: Math.round(sg.carried || 0), L: sg.Lm != null ? Math.round(sg.Lm * 10) / 10 : null, dia: sg.dia || 0, v: sg.v || 0 });
    leaves.filter((d) => seen[d.id]).forEach((d) => {
      let u = d.id, pa = 0, len = 0, ok = true; const path = [];
      while (parent[u] != null) { const sg = segByChild[u]; if (!sg) { ok = false; break; } path.push(sg); len += sg.Lm || 0; pa += (sg.pa || 0) * (sg.Lm || 0); u = parent[u]; }
      if (ok) {
        const tot = pa + 25, side = d.type === "return" ? "return" : "supply";
        const rec = { name: d.name, len, pa: tot, side, path: path.slice().reverse() };
        if (!index || tot > index.pa) index = { name: d.name, len, pa: tot, side };
        if (side === "return") { if (!retBest || tot > retBest.pa) retBest = rec; }
        else { if (!supBest || tot > supBest.pa) supBest = rec; }
      }
    });
    const indexPath = supBest ? supBest.path.map(segToRow) : [];
    const returnPath = retBest ? retBest.path.map(segToRow) : [];
    const orphans = leaves.filter((n) => !seen[n.id]).map((n) => n.id);
    return { unit, segs, totalFlow, returnFlow, returns, raV, index, indexPath, returnPath, cycle, orphans };
  }, [nodes, edges, scale, nr, mat, method, paRate, vMain, vBranch, raFaceV, raFree, raType, raLpm]);

  // Auto-save the drawn layout (geometry only) + the computed index paths so the Fan tab can pull them.
  useEffect(() => {
    if (drag != null) return; // write once on release, not every drag frame

  }, [nodes, edges, scale, scaleLen, iw, ih, raFaceV, raFree, raType, raLpm, drag, plan]);

  const selNode = nodes.find((n) => n.id === target) || null;
  const measuredM = (scalePts.length === 2 && scale > 0)

  const areaM2 = (scalePts.length === 2 && scale > 0)
    ? (Math.abs(scalePts[1].x - scalePts[0].x) / scale) * (Math.abs(scalePts[1].y - scalePts[0].y) / scale) : null;
  const modeHint = {
    unit: "Tap the plan to place the indoor unit (one only).",
    diffuser: "Tap to drop a supply diffuser (style set by “Draw as”).",
    return: "Tap to drop a return air grille (style set by “Draw as”).",
    junction: "Tap to drop a duct junction / elbow.",
    connect: connectFrom ? "Tap the next node to continue the run." : "Tap a node to start a run (unit → … → diffuser, and unit → … → return grille).",
    select: "Drag nodes to reposition; drag the gold handle to rotate. Tap a diffuser / return / unit to edit it.",
    scale: "Tap two points along a known length, then enter it.",
    measure: "Tap two points to read a real-world distance (needs a scale).",

  const tools = [["unit", "Unit"], ["diffuser", "Diffuser"], ["return", "Return"], ["junction", "Junction"], ["connect", "Connect"], ["select", "Move"], ["scale", "Scale"], ["measure", "Measure"], ["area", "Area"], ["delete", "Delete"]];

  const cardRef = React.useRef(null);
  const ZMIN = 0.00001, ZMAX = 1000, zLog = Math.log(ZMAX) - Math.log(ZMIN);
  const clampZoom = (z) => Math.min(ZMAX, Math.max(ZMIN, z));
  const zoomT = (Math.log(clampZoom(zoom)) - Math.log(ZMIN)) / zLog;
  const setZoomT = (t) => setZoom(clampZoom(ZMIN * Math.exp(t * zLog)));
  const zoomBy = (f) => setZoom((z) => clampZoom(z * f));
  const fmtZoom = (z) => { const p = z * 100; if (p >= 1000) return Math.round(p).toLocaleString() + "%"; if (p >= 100) return Math.round(p) + "%"; if (p >= 10) return p.toFixed(0) + "%"; if (p >= 1) return p.toFixed(1) + "%"; if (p >= 0.01) return p.toFixed(3) + "%"; return p.toExponential(1) + "%"; };
  const fitZoom = () => { const w = (typeof window !== "undefined" ? window.innerWidth : 1000); const target = maxed ? w - 40 : Math.min(w - 60, 1080); setZoom(clampZoom(target / (iw || 1))); };
  const onPctInput = (v) => { const p = parseFloat(v); if (isFinite(p) && p > 0) setZoom(clampZoom(p / 100)); };
  const toggleMax = () => { const el = cardRef.current; const next = !maxed; setMaxed(next); try { if (next) { if (el && el.requestFullscreen) el.requestFullscreen(); } else if (document.fullscreenElement) { document.exitFullscreen(); } } catch (e) {} };
  useEffect(() => { const h = () => { if (!document.fullscreenElement) setMaxed(false); }; document.addEventListener("fullscreenchange", h); return () => document.removeEventListener("fullscreenchange", h); }, []);

  return (

                  <text x={n.x} y={n.y - (ghd + 8)} textAnchor="middle" fontSize="12" fill="var(--ink)" stroke="#06101e" strokeWidth="3" paintOrder="stroke">{(n.name || "").slice(0, 12)}</text>
                  <text x={n.x} y={n.y + ghd + 15} textAnchor="middle" fontSize="11" fill="var(--gold)" stroke="#06101e" strokeWidth="3" paintOrder="stroke">{numOf(n.flow) ? Math.round(numOf(n.flow)) + " L/s" : "—"}{ps && ps.dia ? " · Ø" + ps.dia : ""}</text>
                  {n.gsize && <text x={n.x} y={n.y + ghd + 28} textAnchor="middle" fontSize="9.5" fill="var(--faint)" stroke="#06101e" strokeWidth="3" paintOrder="stroke">{gtd === "slot" ? n.gsize + " mm slot" : String(n.gsize).replace("x", "×") + " mm"}</text>}
                </g>);
            })}
            {selNode && mode === "select" && (selNode.type === "diffuser" || selNode.type === "return" || selNode.type === "unit") && (() => {
              const n = selNode;
              const gt = n.type === "return" ? (n.gtype || raType) : (n.type === "diffuser" ? (n.gtype || "") : "unit");
              const dp = dimPx(gt, n.gsize, scale);
              const hh = dp ? dp.hh : (n.type === "unit" ? 15 : 14);
              const R = Math.max(hh, 14) + 22;

              return (<g>
                <line x1={n.x} y1={n.y} x2={hx} y2={hy} stroke="var(--gold)" strokeWidth="1.5" strokeDasharray="3 3" />
                <circle cx={hx} cy={hy} r="8" fill="var(--gold)" stroke="#06101e" strokeWidth="1.5" style={{ cursor: "grab" }} onPointerDown={onRotDown(n.id)} onClick={(e) => e.stopPropagation()} />
              </g>);
            })()}
          </svg>
        </div>
      </section>

      <section className="hl-card">
        <div className="hl-cardhead"><h2>Sizing &amp; scale</h2><span className="hl-hint">DA3 · shared with Duct tab</span></div>
        <div className="hl-field"><label className="hl-lbl">Noise rating</label><div className="hl-fieldright"><select className="hl-sel wide" value={nr} onChange={(e) => setNr(e.target.value)}>
          <option value="30">NR30 · bedrooms</option><option value="35">NR35 · living / office</option><option value="40">NR40 · open office</option><option value="45">NR45 · shops</option><option value="50">NR50 · workshops</option></select></div></div>
        <div className="hl-field"><label className="hl-lbl">Material</label><div className="hl-fieldright"><select className="hl-sel wide" value={mat} onChange={(e) => setMat(e.target.value)}>
          <option value="galv">Galvanised</option><option value="alum">Aluminium</option><option value="flex">Flexible</option></select></div></div>
        <div className="hl-field"><label className="hl-lbl">Method</label><div className="hl-fieldright"><select className="hl-sel wide" value={method} onChange={(e) => setMethod(e.target.value)}>
          <option value="ef">Equal friction</option><option value="vel">Velocity</option></select></div></div>
        {method === "ef" && <div className="hl-field"><label className="hl-lbl">Friction rate</label><div className="hl-fieldright"><div className="hl-unitfield"><input className="hl-num" type="number" inputMode="decimal" value={paRate} onChange={(e) => setPaRate(e.target.value)} /><span className="hl-suffix">Pa/m</span></div></div></div>}
        {method === "vel" && (<>
          <div className="hl-field"><label className="hl-lbl">Main velocity</label><div className="hl-fieldright"><div className="hl-unitfield"><input className="hl-num" type="number" inputMode="decimal" value={vMain} onChange={(e) => setVMain(e.target.value)} placeholder={String(NR_LIMITS[nr].main)} /><span className="hl-suffix">m/s</span></div></div></div>
          <div className="hl-field"><label className="hl-lbl">Branch velocity</label><div className="hl-fieldright"><div className="hl-unitfield"><input className="hl-num" type="number" inputMode="decimal" value={vBranch} onChange={(e) => setVBranch(e.target.value)} placeholder={String(NR_LIMITS[nr].branch)} /><span className="hl-suffix">m/s</span></div></div></div>
        </>)}
        <div className="hl-field"><label className="hl-lbl">Ceiling height</label>
          <div className="hl-fieldright"><div className="hl-unitfield"><input className="hl-num" type="number" inputMode="decimal" value={ceil} onChange={(e) => setCeil(e.target.value)} placeholder="—" /><span className="hl-suffix">mm</span></div></div></div>
        {detected && (
          <div className="hl-detbox">
            {detected.ceil.length > 0 ? (<>
              <div className="hl-note">Ceiling-height notes found in the drawing — tap a value to use it{pdfPages > 1 ? ", or tap the sheet to jump there" : ""}:</div>

                <span key={i} className="hl-chip" onClick={() => setCeil(String(c.mm))} title={"Found on sheet " + c.page}>
